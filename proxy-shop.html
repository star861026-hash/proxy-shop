// 圖片壓縮：自動縮小到最大 800px 寬，品質 70%，確保不超過 Firebase 限制
function compressImage(file, maxW=800, quality=0.7){
  return new Promise(resolve=>{
    const r=new FileReader();
    r.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement("canvas");
        let w=img.width, h=img.height;
        if(w>maxW){ h=Math.round(h*maxW/w); w=maxW; }
        canvas.width=w; canvas.height=h;
        canvas.getContext("2d").drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL("image/jpeg",quality));
      };
      img.src=ev.target.result;
    };
    r.readAsDataURL(file);
  });
}
function useImg(init=null){
  const [img,setImg]=useState(init);
  const ref=useRef();
  function pick(){ref.current?.click();}
  async function onChange(e){
    const f=e.target.files?.[0]; if(!f)return;
    const compressed=await compressImage(f);
    setImg(compressed);
    e.target.value="";
  }
  return{img,setImg,ref,pick,onChange};
}

// ══ CLIENT WALLET CARD (agent) ═══════════════
function ClientCard({c,orders,wallets,setWallets,setClients,showToast}){
  const [showW,setShowW]=useState(false);
  const [amt,setAmt]=useState("");const [note,setNote]=useState("");
  const w=wallets[c.clientCode]||{balance:0,logs:[]};
  const n=orders.filter(o=>o.clientCode===c.clientCode).length;
  const totalDep=(w.logs||[]).filter(l=>l.type==="add").reduce((s,l)=>s+l.amount,0);
  const lv=getMemberLevel(totalDep);
  function doTopup(type){
    const a=parseInt(amt);if(!a||a<=0)return;
    const now=new Date().toISOString().split("T")[0];
    const delta=type==="add"?a:-a;
    const newBal=(w.balance||0)+delta;
    if(newBal<0){showToast("餘額不足","error");return;}
    const newLog={id:Date.now(),date:now,type,amount:delta,note:note||(type==="add"?"充值":"扣款")};
    setWallets(p=>({...p,[c.clientCode]:{balance:newBal,logs:[...(w.logs||[]),newLog]}}));
    setAmt("");setNote("");
    showToast(type==="add"?`已充值 NT$${a.toLocaleString()} 🎉`:`已扣款 NT$${a.toLocaleString()}`);
  }
  return(
    <div className="card" style={{overflow:"hidden"}}>
      <div style={{padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:38,height:38,borderRadius:11,background:"linear-gradient(135deg,#bae6fd,#c8756a)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>👤</div>
          <div>
            <div style={{fontWeight:800,color:"#2d1f1a",fontSize:15}}>{c.name} <span style={{fontSize:12,color:lv.color,fontWeight:700}}>{lv.icon}{lv.name}</span></div>
            <div style={{fontSize:12,color:"#b8887a"}}>{n} 筆　<span style={{color:"#b5622e",fontWeight:700}}>💰 NT${(w.balance||0).toLocaleString()}</span></div>
          </div>
        </div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>setShowW(p=>!p)} className="tap" style={{padding:"6px 12px",borderRadius:10,border:"1.5px solid #f0d9cc",background:"#fffaf5",fontSize:12,cursor:"pointer",fontWeight:700,color:"#c8756a",fontFamily:"inherit"}}>{showW?"▲":"💰"}</button>
          <button onClick={()=>setClients(p=>p.filter(x=>x.clientCode!==c.clientCode))} className="tap" style={{padding:"6px 12px",borderRadius:10,border:"1.5px solid #fee2e2",background:"#fff8f8",fontSize:12,cursor:"pointer",fontWeight:700,color:"#f87171",fontFamily:"inherit"}}>🗑️</button>
        </div>
      </div>
      {showW&&(
        <div style={{background:"#fff8ee",borderTop:"1.5px solid #f0c070",padding:"14px 16px"}}>
          <div style={{fontWeight:800,color:"#2d1f1a",fontSize:14,marginBottom:10}}>💰 購物金管理</div>
          <div style={{background:"#fff8ee",borderRadius:12,padding:"10px 14px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:13,color:"#8a4e22",fontWeight:700}}>目前餘額</span>
            <span style={{fontWeight:900,color:"#b5622e",fontSize:20}}>NT${(w.balance||0).toLocaleString()}</span>
          </div>
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            <input className="IS" type="number" value={amt} onChange={e=>setAmt(e.target.value)} placeholder="金額（NT$）" style={{flex:2}}/>
            <input className="IS" value={note} onChange={e=>setNote(e.target.value)} placeholder="備註" style={{flex:3}}/>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>doTopup("add")} className="tap" style={{flex:1,padding:"10px 0",borderRadius:10,border:"none",background:"linear-gradient(135deg,#7cb87a,#9ed09c)",color:"#fff",fontWeight:800,cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>＋ 充值</button>
            <button onClick={()=>doTopup("deduct")} className="tap" style={{flex:1,padding:"10px 0",borderRadius:10,border:"1.5px solid #fee2e2",background:"#fff8f8",color:"#ef4444",fontWeight:800,cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>− 扣款</button>
          </div>
          {(w.logs||[]).length>0&&(
            <div style={{marginTop:12}}>
              <div style={{fontSize:12,color:"#b8887a",fontWeight:700,marginBottom:6}}>最近交易</div>
              {[...(w.logs||[])].reverse().slice(0,5).map(log=>(
                <div key={log.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #f0c070",fontSize:12}}>
                  <span style={{color:"#7a4a22"}}>{log.note} · {log.date}</span>
                  <span style={{fontWeight:800,color:log.amount>0?"#22c55e":"#ef4444"}}>{log.amount>0?"+":""}NT${Math.abs(log.amount).toLocaleString()}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

  );
}

// ══ GROUP ITEM ROW ════════════════════════════
function GroupItemRow({item,idx,onChange,onRemove,canRemove,sellRates,groupProduct,wallets,client}){

        {item.image&&<div style={{position:"absolute",bottom:6,right:6,background:"rgba(0,0,0,.45)",borderRadius:6,padding:"2px 8px",fontSize:10,color:"#fff"}}>更換</div>}
        <input ref={imgRef} type="file" accept="image/*" onChange={handleImg} style={{display:"none"}}/>

      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <input className="IS" type="number" value={item.price} onChange={e=>onChange("price",e.target.value)} placeholder="日幣價格" style={{flex:1,fontSize:13}}/>

        {item.price&&<span style={{fontWeight:800,color:"#b5622e",fontSize:13,whiteSpace:"nowrap"}}>= NT${twd.toLocaleString()}</span>}
      </div>
      {item.price&&<div style={{fontSize:11,color:"#b8887a",marginTop:6}}>匯率 {rate}（{lv.icon}{lv.name}）</div>}
    </div>
  );
}

// ══ CLIENT VIEW ══════════════════════════════
function ClientView({orders,setOrders,clients,setClients,products,sellRates,wallets,setWallets,wishlists,setWishlists,pending,setPending,announce,stockItems,setStockItems,onBack}){
  const [nick,setNick]=useState("");const [inp,setInp]=useState("");
  const [ctab,setCtab]=useState("catalog");const [cat,setCat]=useState("全部");const [search,setSearch]=useState("");
  const [cart,setCart]=useState([]);const [showCart,setShowCart]=useState(false);
  const [detail,setDetail]=useState(null);const [dQty,setDQty]=useState(1);const [dNote,setDNote]=useState("");const [dPrice,setDPrice]=useState("");
  const [showManual,setShowManual]=useState(false);const [mForm,setMForm]=useState({item:"",price:"",currency:"JPY",note:""});
  const [showWish,setShowWish]=useState(false);const [wForm,setWForm]=useState({item:"",note:""});
  const [showGroup,setShowGroup]=useState(null); // holds the group product being ordered
  const [groupItems,setGroupItems]=useState([{name:"",price:"",image:null,imgKey:Date.now()}]);
  const [toast,showToast]=useToast();
  const mImg=useImg();const dImg=useImg();const wImg=useImg();

  const client=clients.find(c=>c.name===nick);
  const myOrders=orders.filter(o=>o.clientName===nick);
  const myWallet=client?(wallets[client.clientCode]||{balance:0,logs:[]}):{balance:0,logs:[]};
  const walletBal=myWallet.balance||0;
  const cartCount=cart.reduce((s,i)=>s+i.qty,0);
  const cartTotal=cart.reduce((s,i)=>s+(i.product?.isStock?(i.product.priceTWD||i.product.price)*i.qty:productTWD(i.product,sellRates)*i.qty),0);
  const visible=products.filter(p=>(cat==="全部"||p.category===cat)&&(!search||p.name.toLowerCase().includes(search.toLowerCase())||p.desc?.toLowerCase().includes(search.toLowerCase())));

  function lookup(){
    if(!inp.trim()){showToast("請輸入名字","error");return;}
    const name=inp.trim();
    const existing=clients.find(c=>c.name===name);
    if(!existing){
      const code="U"+Date.now().toString().slice(-6);
      setClients(p=>{const np=[...p,{clientCode:code,name}];save("clients",np);return np;});
      // 新客人第一次登入通知
      const time=new Date().toLocaleString("zh-TW",{hour12:false});
      notifyDiscord(`👋 **新客人登入！**\n👤 **${name}** 第一次進入系統\n🕐 ${time}`);
    } else {
      // 舊客人登入通知
      const time=new Date().toLocaleString("zh-TW",{hour12:false});
      notifyDiscord(`🔔 **客人上線！**\n👤 **${name}** 進入系統\n🕐 ${time}`);
    }
    setNick(name);setCart([]);
  }

  function addToCart(product,qty,note,image=null){
    setCart(prev=>{
      const ex=prev.find(i=>i.product.id===product.id&&!image);
      if(ex&&!image)return prev.map(i=>i.product.id===product.id?{...i,qty:i.qty+qty,note:note||i.note}:i);
      return [...prev,{product,qty,note,image,cartId:Date.now()+Math.random()}];
    });
    showToast("已加入購物車 🛒");
  }
  function rmCart(id){setCart(p=>p.filter(i=>i.cartId!==id));}
  function updQty(id,d){setCart(p=>p.map(i=>i.cartId===id?{...i,qty:Math.max(1,i.qty+d)}:i));}

  function submitCart(){
    if(!cart.length)return;
    const now=new Date().toISOString().split("T")[0];
    const time=new Date().toLocaleString("zh-TW",{hour12:false});

    // Split cart into stock items and preorder items
    const stockCart   = cart.filter(i=>i.product?.isStock);
    const preorderCart= cart.filter(i=>!i.product?.isStock);

    const nos=[];

    // Stock items → direct orders, deduct qty
    if(stockCart.length>0){
      stockCart.forEach(item=>{
        nos.push({
          id:Date.now()+Math.random(),
          clientCode:client.clientCode,clientName:client.name,
          item:"🏪 "+item.product.name+(item.qty>1?` x${item.qty}`:""),
          price:item.product.priceTWD*item.qty,
          currency:"TWD",customRate:1,
          note:item.note,image:item.image||null,
          status:"pending",isStock:true,
          createdAt:now,updatedAt:now,walletDeducted:false
        });
      });
      // Deduct stock qty
      setStockItems(p=>p.map(s=>{
        const inCart=stockCart.find(i=>i.product.stockId===s.id);
        if(inCart) return {...s,qty:Math.max(0,s.qty-inCart.qty)};
        return s;
      }));
    }

    // Preorder items → pending_review
    if(preorderCart.length>0){
      preorderCart.forEach(item=>{
        nos.push({
          id:Date.now()+Math.random(),
          clientCode:client.clientCode,clientName:client.name,
          item:item.product.name+(item.qty>1?` x${item.qty}`:""),
          price:item.product.price*item.qty,
          clientPrice:item.product.price*item.qty,
          currency:"JPY",
          rateType:item.product.rateType||"general",
          groupRateType:item.product.groupRateType||"general",
          customRate:item.product.customRate,
          note:item.note,image:item.image||null,
          status:"pending_review",
          createdAt:now,updatedAt:now,walletDeducted:false
        });
      });
    }

    setOrders(p=>[...p,...nos]);
    const total=nos.reduce((s,o)=>s+productTWD(o,sellRates),0);
    if(preorderCart.length>0){
      const itemList=preorderCart.map(i=>{
        const p=i.product;
        const rate=RATE_TYPES[p.groupRateType||p.rateType||"general"]?.rate||0.26;
        const twd=p.rateType==="gacha"?gachaTWD(p.price,p.keepShell):Math.ceil(p.price*rate);
        return `　📦 ${p.name}${i.qty>1?` x${i.qty}`:""} ¥${p.price} ≈ NT$${twd}${i.note?` (${i.note})`:""}`;
      }).join("\n");
      notifyDiscord(`🛍️ **新喊單！需審核金額**\n👤 客人：**${client.name}**\n${itemList}\n💰 預估：NT$${total.toLocaleString()}\n🕐 ${time}\n⚠️ 請至後台審核並確認金額`);
    }
    if(stockCart.length>0){
      const stockList=stockCart.map(i=>`　🏪 ${i.product.name}${i.qty>1?` x${i.qty}`:""} NT$${i.product.priceTWD}`).join("\n");
      notifyDiscord(`🏪 **現貨訂單！**\n👤 客人：**${client.name}**\n${stockList}\n🕐 ${time}`);
    }
    showToast(`已送出 ${nos.length} 件 🎉`);
    setCart([]);setShowCart(false);setCtab("orders");
  }

  function submitManual(){
    if(!mForm.item||!mForm.price){showToast("請填寫商品名稱和價格","error");return;}
    const now=new Date().toISOString().split("T")[0];
    const time=new Date().toLocaleString("zh-TW",{hour12:false});
    setOrders(p=>[...p,{id:Date.now(),clientCode:client.clientCode,clientName:client.name,
      item:mForm.item,price:+mForm.price,currency:mForm.currency,note:mForm.note,image:mImg.img,status:"pending",createdAt:now,updatedAt:now}]);
    notifyDiscord(`✍️ **手動喊單！**\n👤 **${client.name}**\n　📦 ${mForm.item}　${mForm.currency} ${mForm.price}${mForm.note?`\n　📝 ${mForm.note}`:""}\n🕐 ${time}`);
    setMForm({item:"",price:"",currency:"JPY",note:""});mImg.setImg(null);setShowManual(false);
    showToast("已送出需求 🎉");
  }

  return(
    <div style={{minHeight:"100vh",paddingBottom:80}}>
      <Toast t={toast}/>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#e8a898,#c8756a)",padding:"16px 20px 24px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:12,color:"rgba(255,255,255,.7)"}}>🛍️ ShopTrack</div>
            <div style={{fontWeight:900,fontSize:20,color:"#fff",marginTop:2}}>{nick?`👋 ${nick}`:"客人點單專區"}</div>
          </div>

              <button onClick={()=>setShowGroup(null)} style={{background:"#fff8f0",border:"none",borderRadius:10,width:32,height:32,cursor:"pointer",fontSize:18,color:"#b8887a",flexShrink:0}}>×</button>
            </div>

                const now=new Date().toISOString().split("T")[0];

                // get member level for client's souvenir rate

                const dep=(w.logs||[]).filter(l=>l.type==="add").reduce((s,l)=>s+l.amount,0);

            <div style={{marginBottom:14}}>
              <label className="LS">📷 商品圖片（選填）</label>
              <ImgBox img={wImg.img} onPick={wImg.pick} iref={wImg.ref} onChange={wImg.onChange} label="上傳商品截圖" h={100}/>
              <div style={{fontSize:11,color:"#f87171",fontWeight:700,marginTop:5}}>⚠️ 圖片檔案太大可能導致許願失敗，建議使用截圖或壓縮後再上傳</div>
            </div>
            <div style={{marginBottom:13}}><label className="LS">商品名稱 *</label><input className="IS" value={wForm.item} onChange={e=>setWForm(p=>({...p,item:e.target.value}))} placeholder="例：Hello Kitty 扭蛋、限定版球鞋"/></div>
            <div style={{marginBottom:22}}><label className="LS">備註</label><textarea className="IS" value={wForm.note} onChange={e=>setWForm(p=>({...p,note:e.target.value}))} placeholder="顏色、尺寸、預算等..." rows={3} style={{resize:"none"}}/></div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setShowWish(false)} className="tap btn-gray" style={{flex:1}}>取消</button>
              <button onClick={()=>{
                if(!wForm.item.trim())return;
                const now=new Date().toISOString().split("T")[0];
                const time=new Date().toLocaleString("zh-TW",{hour12:false});
                const newW={id:Date.now(),item:wForm.item.trim(),note:wForm.note,image:wImg.img,date:now,status:"pending"};
                setWishlists(p=>({...p,[client.clientCode]:[...(p[client.clientCode]||[]),newW]}));
                notifyDiscord(`⭐ **新許願！**\n👤 **${client.name}**\n　🎯 ${wForm.item.trim()}${wForm.note?`\n　📝 ${wForm.note}`:""}\n🕐 ${time}`);
                setShowWish(false);setWForm({item:"",note:""});wImg.setImg(null);
              }} className="tap" style={{flex:2,padding:13,borderRadius:14,border:"none",background:"linear-gradient(135deg,#a855f7,#9333ea)",color:"#fff",fontWeight:900,cursor:"pointer",fontSize:14,fontFamily:"inherit"}}>
                送出許願 ⭐
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ══ REVIEW CARD ═══════════════════════════════
function ReviewCard({o,twd,sellRates,onApprove,onReject}){
  const [editPrice,setEditPrice]=useState(String(o.price));
  const rate=RATE_TYPES[o.groupRateType||o.rateType||"general"]?.rate||0.26;
  const finalTWD=editPrice?Math.round(+editPrice*rate):twd;
  return(
    <div className="card" style={{overflow:"hidden"}}>
      {o.image&&<img src={o.image} alt="" style={{width:"100%",height:130,objectFit:"cover"}}/>}
      <div style={{padding:14}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
          <span className="chip" style={{background:"#fff1f1",color:"#e11d48"}}>🔍 待審核</span>
          <span style={{fontSize:11,color:"#d4a898"}}>👤 {o.clientName} · {o.createdAt}</span>
        </div>
        <div style={{fontWeight:900,fontSize:15,color:"#2d1f1a",marginBottom:8}}>{o.item}</div>
        {o.note&&<div style={{background:"#fffaf5",borderRadius:10,padding:"6px 10px",fontSize:12,color:"#8a6a5a",marginBottom:10}}>📝 {o.note}</div>}

        {/* 金額審核 */}
        <div style={{background:"#fff8ee",border:"1.5px solid #f0c070",borderRadius:12,padding:"12px 14px",marginBottom:12}}>
          <div style={{fontSize:12,color:"#8a4e22",fontWeight:700,marginBottom:8}}>💴 審核金額（可修改）</div>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
            <input type="number" value={editPrice} onChange={e=>setEditPrice(e.target.value)}
              style={{flex:1,padding:"8px 12px",borderRadius:10,border:"1.5px solid #f0c070",fontSize:16,fontWeight:900,color:"#b5622e",fontFamily:"inherit",outline:"none",background:"#fff"}}/>
            <span style={{color:"#b8887a",fontWeight:700}}>¥</span>
          </div>
          <div style={{fontSize:13,color:"#b5622e",fontWeight:800}}>
            ≈ NT${finalTWD.toLocaleString()}
            <span style={{fontSize:11,color:"#a0622e",fontWeight:400,marginLeft:6}}>（匯率 {rate}）</span>
          </div>
        </div>

        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>onApprove(+editPrice)} className="tap"
            style={{flex:2,padding:"11px 0",borderRadius:10,border:"none",background:"linear-gradient(135deg,#7cb87a,#9ed09c)",color:"#fff",fontWeight:800,cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>
            ✅ 確認金額 NT${finalTWD.toLocaleString()}
          </button>
          <button onClick={onReject} className="tap"
            style={{flex:1,padding:"11px 0",borderRadius:10,border:"1.5px solid #fee2e2",background:"#fff8f8",color:"#ef4444",fontWeight:800,cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>
            ❌ 拒絕
          </button>
        </div>
      </div>
    </div>
  );
}

// ══ STOCK AGENT TAB ══════════════════════════
function StockAgentTab({stockItems,setStockItems,orders,setOrders,clients,showToast}){
  const [showForm,setShowForm]=useState(false);
  const [editItem,setEditItem]=useState(null);
  const [form,setForm]=useState({name:"",priceTWD:"",qty:"",desc:"",image:null});
  const imgUp=useImg();

  function openAdd(){ setEditItem(null); setForm({name:"",priceTWD:"",qty:"",desc:"",image:null}); imgUp.setImg(null); setShowForm(true); }
  function openEdit(item){ setEditItem(item); setForm({...item,priceTWD:String(item.priceTWD),qty:String(item.qty)}); imgUp.setImg(item.image); setShowForm(true); }
  function submit(){
    if(!form.name||!form.priceTWD||!form.qty){showToast("請填寫名稱、售價和數量","error");return;}
    const data={...form,priceTWD:+form.priceTWD,qty:+form.qty,image:imgUp.img};
    if(editItem){ setStockItems(p=>p.map(x=>x.id===editItem.id?{...x,...data}:x)); showToast("已更新 ✨"); }
    else{ setStockItems(p=>[...p,{id:Date.now(),...data}]); showToast("現貨已上架 🎉"); }
    setShowForm(false); setEditItem(null);
  }

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{fontWeight:800,fontSize:15,color:"#2d1f1a"}}>🏪 現貨管理</div>
        <button onClick={openAdd} className="tap"
          style={{background:"linear-gradient(135deg,#c8756a,#e0957a)",color:"#fff",border:"none",borderRadius:16,padding:"8px 16px",fontWeight:800,cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>
          ＋ 上架現貨
        </button>
      </div>

      {stockItems.length===0
        ?<div className="card" style={{padding:40,textAlign:"center",color:"#d4a898"}}><div style={{fontSize:36}}>🏪</div><div style={{fontWeight:700,marginTop:8}}>還沒有現貨商品</div></div>
        :<div className="grid2">
          {stockItems.map(item=>(
            <div key={item.id} className="card" style={{overflow:"hidden",opacity:item.qty>0?1:.6}}>
              <div style={{width:"100%",height:110,background:"#fff8f0",position:"relative",overflow:"hidden"}}>
                {item.image?<img src={item.image} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                  :<div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,color:"#d4a898"}}>🏷️</div>}
                <div style={{position:"absolute",top:6,left:6,background:item.qty>0?"#22c55e":"#ef4444",color:"#fff",borderRadius:8,padding:"2px 8px",fontSize:10,fontWeight:800}}>
                  {item.qty>0?`庫存 ${item.qty}`:"售完"}
                </div>
              </div>
              <div style={{padding:"10px 12px"}}>
                <div style={{fontWeight:800,fontSize:13,color:"#2d1f1a",marginBottom:2}}>{item.name}</div>
                {item.desc&&<div style={{fontSize:11,color:"#b8887a",marginBottom:4}}>{item.desc}</div>}
                <div style={{fontWeight:900,color:"#22c55e",fontSize:14,marginBottom:8}}>NT${item.priceTWD.toLocaleString()}</div>
                <div style={{display:"flex",gap:6}}>
                  <button onClick={()=>openEdit(item)} className="tap" style={{flex:1,padding:"5px 0",borderRadius:8,border:"1.5px solid #f0d9cc",background:"#fffaf5",fontSize:11,cursor:"pointer",fontWeight:700,color:"#c8756a",fontFamily:"inherit"}}>✏️ 編輯</button>
                  <button onClick={()=>setStockItems(p=>p.filter(x=>x.id!==item.id))} className="tap" style={{flex:1,padding:"5px 0",borderRadius:8,border:"1.5px solid #fee2e2",background:"#fff8f8",fontSize:11,cursor:"pointer",fontWeight:700,color:"#f87171",fontFamily:"inherit"}}>🗑️</button>
                </div>
              </div>
            </div>
          ))}
        </div>
      }

      {/* Form Modal */}
      {showForm&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowForm(false)}>
          <div className="modal-box">
            <div className="modal-handle"/>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:18}}>
              <div style={{fontWeight:900,fontSize:18,color:"#2d1f1a"}}>{editItem?"✏️ 編輯現貨":"＋ 上架現貨"}</div>
              <button onClick={()=>setShowForm(false)} style={{background:"#fff8f0",border:"none",borderRadius:10,width:32,height:32,cursor:"pointer",fontSize:18,color:"#b8887a"}}>×</button>
            </div>
            <div style={{marginBottom:14}}><label className="LS">商品圖片</label><ImgBox img={imgUp.img} onPick={imgUp.pick} iref={imgUp.ref} onChange={imgUp.onChange} label="上傳現貨圖片" h={140}/></div>
            <div style={{marginBottom:13}}><label className="LS">商品名稱 *</label><input className="IS" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="例：Hello Kitty 扭蛋 草莓款"/></div>
            <div style={{display:"flex",gap:10,marginBottom:13}}>
              <div style={{flex:1}}>
                <label className="LS">售價 NT$ *</label>
                <input className="IS" type="number" value={form.priceTWD} onChange={e=>setForm(p=>({...p,priceTWD:e.target.value}))} placeholder="例：350"/>
              </div>
              <div style={{flex:1}}>
                <label className="LS">庫存數量 *</label>
                <input className="IS" type="number" value={form.qty} onChange={e=>setForm(p=>({...p,qty:e.target.value}))} placeholder="例：5"/>
              </div>
            </div>
            <div style={{marginBottom:20}}><label className="LS">商品說明（選填）</label><input className="IS" value={form.desc} onChange={e=>setForm(p=>({...p,desc:e.target.value}))} placeholder="例：全新未拆，附原廠盒"/></div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setShowForm(false)} className="tap btn-gray" style={{flex:1}}>取消</button>
              <button onClick={submit} className="tap btn-blue" style={{flex:2}}>{editItem?"儲存變更":"上架現貨"}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function AgentDash({orders,setOrders,clients,setClients,products,setProducts,onLogout,liveRates,sellRates,setSellRates,wallets,setWallets,wishlists,setWishlists,pending,setPending,announce,setAnnounce,stockItems,setStockItems}){
  const [tab,setTab]=useState("orders");
  const [fStatus,setFStatus]=useState("all");
  const [viewMode,setViewMode]=useState("list"); // "list" or "byClient"
  const [showOF,setShowOF]=useState(false);const [editO,setEditO]=useState(null);
  const [showPF,setShowPF]=useState(false);const [editP,setEditP]=useState(null);
  const [editingR,setEditingR]=useState(false);const [tempSell,setTempSell]=useState({...sellRates});
  const [newCName,setNewCName]=useState("");
  const [oForm,setOForm]=useState({clientName:"",clientCode:"",item:"",price:"",currency:"JPY",note:"",status:"pending",rateType:"general"});
  const [pForm,setPForm]=useState({name:"",price:"",currency:"JPY",category:"美妝保養",desc:"",inStock:true,rateType:"general",keepShell:false,customRate:""});
  const [toast,showToast]=useToast();
  const pImg=useImg();
  const oImg=useImg();

  const filtered=orders.filter(o=>fStatus==="all"||o.status===fStatus);
  const totalProfit=orders.reduce((s,o)=>s+(productTWD(o,sellRates)-toTWD(o.price,o.currency,liveRates)),0);
  const stats={total:orders.length,pending:orders.filter(o=>o.status==="pending").length,bought:orders.filter(o=>o.status==="bought").length};

  function submitO(){
    if(!oForm.clientName||!oForm.item||!oForm.price){showToast("請填寫必填欄位","error");return;}
    const now=new Date().toISOString().split("T")[0];
    const c=clients.find(x=>x.name===oForm.clientName);
    const entry={...oForm,clientCode:c?.clientCode||oForm.clientCode||"",price:+oForm.price,image:oImg.img||null};
    if(editO){setOrders(p=>p.map(o=>o.id===editO.id?{...o,...entry,updatedAt:now}:o));showToast("已更新 ✨");}
    else{setOrders(p=>[...p,{id:Date.now(),...entry,createdAt:now,updatedAt:now}]);showToast("已新增 🎉");}
    setShowOF(false);setEditO(null);oImg.setImg(null);
    setOForm({clientName:"",clientCode:"",item:"",price:"",currency:"JPY",note:"",status:"pending",rateType:"general"});
  }
  function submitP(){
    if(!pForm.name){showToast("請填寫商品名稱","error");return;}
    if(pForm.rateType==="gacha"&&!pForm.price){showToast("請選擇扭蛋定價","error");return;}
    const cr=pForm.customRate?+pForm.customRate:undefined;
    const pr=pForm.rateType==="gacha"?+pForm.price:0;
    const rateKey=pForm.rateType==="group"?(pForm.groupRateType||"general"):pForm.rateType;
    if(editP){setProducts(p=>p.map(x=>x.id===editP.id?{...x,...pForm,price:pr,customRate:cr,rateType:pForm.rateType,groupRateType:rateKey,image:pImg.img??x.image}:x));showToast("已更新 ✨");}
    else{setProducts(p=>[...p,{id:Date.now(),...pForm,price:pr,customRate:cr,rateType:pForm.rateType,groupRateType:rateKey,currency:"JPY",image:pImg.img}]);showToast("已新增 🎉");}
    setShowPF(false);setEditP(null);pImg.setImg(null);
    setPForm({name:"",price:"",currency:"JPY",category:"美妝保養",desc:"",inStock:true,rateType:"general",keepShell:false,customRate:"",groupRateType:"general"});
  }
  function openEditO(o){setEditO(o);setOForm({...o,price:String(o.price)});setShowOF(true);}
  function openEditP(p){setEditP(p);setPForm({...p,price:String(p.price),customRate:p.customRate?String(p.customRate):"",rateType:p.rateType||"general",keepShell:p.keepShell||false,groupRateType:p.groupRateType||"general"});pImg.setImg(p.image);setShowPF(true);}
  function chStatus(id,s){
    const order=orders.find(o=>o.id===id);
    setOrders(p=>p.map(o=>o.id===id?{...o,status:s,updatedAt:new Date().toISOString().split("T")[0]}:o));
    showToast(`${STATUS[s].icon} ${STATUS[s].label}`);
    // 業者確認「已買到」時才從購物金扣款（只扣一次）
    if(s==="bought"&&order&&!order.walletDeducted){
      const client=clients.find(c=>c.clientCode===order.clientCode);
      if(!client) return;
      const w=wallets[client.clientCode]||{balance:0,logs:[]};
      const cost=productTWD(order,sellRates);
      if(cost>0&&(w.balance||0)>=cost){
        const now=new Date().toISOString().split("T")[0];
        setWallets(p=>({...p,[client.clientCode]:{balance:(w.balance||0)-cost,
          logs:[...(w.logs||[]),{id:Date.now(),date:now,type:"deduct",amount:-cost,note:`確認扣款：${order.item}`}]}}));
        setOrders(p=>p.map(o=>o.id===id?{...o,walletDeducted:true}:o));
        showToast(`💰 已從 ${client.name} 購物金扣除 NT$${cost.toLocaleString()}`);
      }
    }
    // 取消訂單時退款（若已扣款）
    if(s==="cancelled"&&order&&order.walletDeducted){
      const client=clients.find(c=>c.clientCode===order.clientCode);
      if(!client) return;
      const w=wallets[client.clientCode]||{balance:0,logs:[]};
      const cost=productTWD(order,sellRates);
      if(cost>0){
        const now=new Date().toISOString().split("T")[0];
        setWallets(p=>({...p,[client.clientCode]:{balance:(w.balance||0)+cost,
          logs:[...(w.logs||[]),{id:Date.now(),date:now,type:"add",amount:cost,note:`取消退款：${order.item}`}]}}));
        setOrders(p=>p.map(o=>o.id===id?{...o,walletDeducted:false}:o));
        showToast(`💰 已退款 NT$${cost.toLocaleString()} 給 ${client.name}`);
      }
    }
  }
  function delOrder(id){
    const order=orders.find(o=>o.id===id);
    // 若已扣款，退還購物金
    if(order&&order.walletDeducted){
      const client=clients.find(c=>c.clientCode===order.clientCode);
      if(client){
        const w=wallets[client.clientCode]||{balance:0,logs:[]};
        const cost=productTWD(order,sellRates);
        const now=new Date().toISOString().split("T")[0];
        setWallets(p=>({...p,[client.clientCode]:{balance:(w.balance||0)+cost,
          logs:[...(w.logs||[]),{id:Date.now(),date:now,type:"add",amount:cost,note:`退款：${order.item}`}]}}));
        showToast(`💰 已退款 NT$${cost.toLocaleString()} 給 ${client.name}`);
      }
    }
    setOrders(p=>p.filter(o=>o.id!==id));
  }
  function addClient(){
    if(!newCName.trim()){showToast("請填寫群組暱稱","error");return;}
    if(clients.find(c=>c.name===newCName.trim())){showToast("此暱稱已存在","error");return;}
    const code=`A${String(clients.length+1).padStart(3,"0")}`;
    setClients(p=>[...p,{clientCode:code,name:newCName.trim()}]);setNewCName("");showToast(`已新增 🎉`);
  }

  const reviewCount=orders.filter(o=>o.status==="pending_review").length;
  const TABS=[{key:"orders",label:"訂單管理"},{key:"review",label:`審核${reviewCount>0?` (${reviewCount})`:""}`,badge:reviewCount>0},{key:"products",label:"代購目錄"},{key:"stock",label:"🏪 現貨"},{key:"wish",label:"許願清單"},{key:"exchange",label:"匯率設定"},{key:"clients",label:"客人管理"},{key:"history",label:"歷程"},{key:"settings",label:"⚙️ 設定"}];

  return(
    <div style={{minHeight:"100vh",paddingBottom:48}}>
      <Toast t={toast}/>
      <div style={{margin:"14px 16px 0",background:"#fff8ee",border:"1.5px solid #f0c070",borderRadius:16,padding:"12px 16px"}}>
        <div style={{fontSize:12,color:"#a0622e",fontWeight:700,marginBottom:3}}>📜 最新公告</div>
        <div style={{fontSize:15,fontWeight:900,color:"#1a1a1a"}}>{announce?.title||"歡迎使用代購管理系統"}</div>
        {announce?.body&&<div style={{fontSize:13,color:"#7a4a22",marginTop:2,whiteSpace:"pre-line"}}>{announce.body}</div>}
      </div>
      <div className="card" style={{margin:"12px 16px",padding:"14px 18px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:42,height:42,borderRadius:13,background:"linear-gradient(135deg,#f5c89a,#e8956a)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>👑</div>
          <div><div style={{fontWeight:900,fontSize:16,color:"#2d1f1a"}}>業者後台</div><div style={{fontSize:12,color:"#b8887a"}}>admin</div></div>
        </div>
        <button onClick={onLogout} className="tap" style={{padding:"7px 14px",borderRadius:20,border:"1.5px solid #f0d9cc",background:"#fffaf5",color:"#b8887a",fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>登出</button>
      </div>
      <div style={{margin:"0 16px",borderBottom:"1.5px solid #f0d9cc",display:"flex",gap:12,overflowX:"auto"}}>
        {TABS.map(t=><button key={t.key} className={`tab-btn ${tab===t.key?"active":""}`} onClick={()=>setTab(t.key)}>{t.label}</button>)}
      </div>

      <div style={{padding:"16px 16px 0"}}>
        {/* Stats */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
          {[{label:"總訂單",v:stats.total,icon:"📋",c:"#c8756a"},{label:"待購買",v:stats.pending,icon:"⏳",c:"#f59e0b"},{label:"已買到",v:stats.bought,icon:"✅",c:"#22c55e"},
            {label:"預估利潤",v:`$${Math.abs(totalProfit).toLocaleString()}`,icon:"💰",c:"#e11d48",sm:true}].map(s=>(
            <div key={s.label} className="card" style={{padding:"12px 8px",textAlign:"center"}}>
              <div style={{fontSize:18}}>{s.icon}</div>
              <div style={{fontSize:s.sm?12:22,fontWeight:900,color:s.c,lineHeight:1.2,marginTop:2}}>{s.v}</div>
              <div style={{fontSize:10,color:"#b8887a",fontWeight:700,marginTop:3}}>{s.label}</div>
            </div>
          ))}
        </div>

        {/* ORDERS */}
        {tab==="orders"&&(
          <>
            {/* 工具列 */}
            <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
              <button onClick={()=>{setShowOF(true);setEditO(null);setOForm({clientName:"",item:"",price:"",currency:"JPY",note:"",status:"pending"});}} className="tap"
                style={{background:"linear-gradient(135deg,#c8756a,#e0957a)",color:"#fff",border:"none",borderRadius:22,padding:"9px 18px",fontWeight:800,cursor:"pointer",fontSize:13,fontFamily:"inherit",boxShadow:"0 2px 10px rgba(200,117,106,.3)"}}>＋ 新增訂單</button>
              {/* 檢視切換 */}
              <div style={{display:"flex",background:"#fff8f0",borderRadius:12,padding:3,gap:2,marginLeft:"auto"}}>
                {[["list","📋"],["byClient","👤"],["byProduct","📦"]].map(([m,l])=>(
                  <button key={m} onClick={()=>setViewMode(m)} className="tap"
                    style={{padding:"6px 10px",borderRadius:9,border:"none",cursor:"pointer",fontWeight:700,fontSize:13,fontFamily:"inherit",
                      background:viewMode===m?"#c8756a":"transparent",color:viewMode===m?"#fff":"#b8887a"}}>{l}</button>
                ))}
              </div>
            </div>
            {/* 狀態篩選（列表模式才顯示）*/}
            {viewMode==="list"&&(
              <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
                {[["all","全部"],...Object.entries(STATUS).map(([k,v])=>[k,v.label])].map(([k,l])=>(
                  <button key={k} onClick={()=>setFStatus(k)} className="tap"
                    style={{padding:"7px 12px",borderRadius:16,border:"none",cursor:"pointer",fontWeight:700,fontSize:12,fontFamily:"inherit",background:fStatus===k?"#c8756a":"#fff8f0",color:fStatus===k?"#fff":"#7ab3d0"}}>{l}</button>

                {filtered.map(o=>{

                const name=e.target.value;
                const c=clients.find(x=>x.name===name);
                setOForm(p=>({...p,clientName:name,clientCode:c?.clientCode||""}));
              }} style={{color:oForm.clientName?"#2d1f1a":"#b8887a",fontWeight:700}}>
                <option value="">請選擇客人</option>
                {clients.map(c=><option key={c.clientCode} value={c.name}>{c.name}</option>)}
              </select>
            </div>

            {/* 商品名稱 */}
            <div style={{marginBottom:13}}><label className="LS">商品名稱 *</label><input className="IS" value={oForm.item} onChange={e=>setOForm(p=>({...p,item:e.target.value}))} placeholder="例：Nike Air Max 2024"/></div>

            {/* 價格幣別 */}
            <div style={{display:"flex",gap:10,marginBottom:13}}>
              <div style={{flex:2}}><label className="LS">價格 *</label><input className="IS" type="number" value={oForm.price} onChange={e=>setOForm(p=>({...p,price:e.target.value}))} placeholder="0"/></div>
              <div style={{flex:1}}><label className="LS">幣別</label><select className="IS" value={oForm.currency} onChange={e=>setOForm(p=>({...p,currency:e.target.value}))} style={{color:"#c8756a",fontWeight:700}}>{CURRENCIES.map(c=><option key={c}>{c}</option>)}</select></div>
            </div>

            {/* 商品類型 */}
            <div style={{marginBottom:13}}>
              <label className="LS">商品類型</label>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {Object.entries(RATE_TYPES).filter(([k])=>k!=="group").map(([k,v])=>(
                  <button key={k} onClick={()=>setOForm(p=>({...p,rateType:k}))} className="tap"
                    style={{padding:"10px 8px",borderRadius:12,border:`2px solid ${oForm.rateType===k?v.color:"#f5e6d8"}`,background:oForm.rateType===k?v.color+"15":"#fffaf5",cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>
                    <div style={{fontWeight:800,fontSize:12,color:oForm.rateType===k?v.color:"#8a6a5a"}}>{v.label}</div>
                    <div style={{fontSize:11,color:"#b8887a",marginTop:2}}>{v.rate?`匯率 ${v.rate}`:"固定定價"}</div>
                  </button>
                ))}
              </div>
            </div>

            {/* 狀態 */}
            <div style={{marginBottom:13}}><label className="LS">狀態</label><select className="IS" value={oForm.status} onChange={e=>setOForm(p=>({...p,status:e.target.value}))} style={{color:"#c8756a",fontWeight:700}}>{Object.entries(STATUS).map(([k,v])=><option key={k} value={k}>{v.icon} {v.label}</option>)}</select></div>

            {/* 備註 */}
            <div style={{marginBottom:22}}><label className="LS">備註</label><textarea className="IS" value={oForm.note} onChange={e=>setOForm(p=>({...p,note:e.target.value}))} placeholder="尺寸、顏色等..." rows={2} style={{resize:"vertical"}}/></div>

            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setShowOF(false)} className="tap btn-gray" style={{flex:1}}>取消</button>
              <button onClick={submitO} className="tap btn-blue" style={{flex:2}}>{editO?"儲存變更":"新增訂單"}</button>
            </div>
          </div>
        </div>
      )}

      {/* PRODUCT FORM */}
      {showPF&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowPF(false)}>
          <div className="modal-box">
            <div className="modal-handle"/>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:18}}>
              <div style={{fontWeight:900,fontSize:18,color:"#2d1f1a"}}>{editP?"✏️ 編輯商品":"＋ 新增商品"}</div>
              <button onClick={()=>setShowPF(false)} style={{background:"#fff8f0",border:"none",borderRadius:10,width:32,height:32,cursor:"pointer",fontSize:18,color:"#b8887a"}}>×</button>
            </div>
            <div style={{marginBottom:16}}><label className="LS">商品圖片</label><ImgBox img={pImg.img} onPick={pImg.pick} iref={pImg.ref} onChange={pImg.onChange} label="點擊上傳商品圖片" h={150}/></div>
            <div style={{marginBottom:13}}><label className="LS">商品名稱 *</label><input className="IS" value={pForm.name} onChange={e=>setPForm(p=>({...p,name:e.target.value}))} placeholder="例：資生堂防曬乳 SPF50"/></div>

            {/* 只有扭蛋才需要填價格 */}
            {pForm.rateType==="gacha"&&(
              <div style={{display:"flex",gap:10,marginBottom:13}}>
                <div style={{flex:2}}><label className="LS">扭蛋日幣定價</label><input className="IS" type="number" value={pForm.price} onChange={e=>setPForm(p=>({...p,price:e.target.value}))} placeholder="200 / 300 / 400 / 500"/></div>
              </div>
            )}

            {/* 非扭蛋顯示提示 */}
            {pForm.rateType!=="gacha"&&(
              <div style={{background:"#fff8f0",border:"1.5px solid #bae6fd",borderRadius:12,padding:"10px 14px",marginBottom:13,fontSize:12,color:"#c8756a",fontWeight:600}}>
                💡 客人下單時自行填寫現地日幣金額，業者審核後確認
              </div>
            )}

            <div style={{marginBottom:13}}><label className="LS">分類</label><select className="IS" value={pForm.category} onChange={e=>setPForm(p=>({...p,category:e.target.value}))} style={{color:"#c8756a",fontWeight:700}}>{CATS.filter(c=>c!=="全部").map(c=><option key={c}>{c}</option>)}</select></div>
            <div style={{marginBottom:13}}><label className="LS">商品說明</label><input className="IS" value={pForm.desc} onChange={e=>setPForm(p=>({...p,desc:e.target.value}))} placeholder="例：75ml，多色可選"/></div>
            <div style={{marginBottom:13}}>
              <label className="LS">商品類型（決定匯率）</label>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {Object.entries(RATE_TYPES).map(([k,v])=>(
                  <button key={k} onClick={()=>setPForm(p=>({...p,rateType:k}))} className="tap"
                    style={{padding:"10px 8px",borderRadius:12,border:`2px solid ${pForm.rateType===k?v.color:"#f5e6d8"}`,background:pForm.rateType===k?v.color+"15":"#fffaf5",cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>
                    <div style={{fontWeight:800,fontSize:12,color:pForm.rateType===k?v.color:"#8a6a5a"}}>{v.label}</div>
                    <div style={{fontSize:11,color:"#b8887a",marginTop:2}}>{k==="group"?"客人自填現地價":v.rate?`匯率 ${v.rate}`:"固定定價"}</div>
                  </button>
                ))}
              </div>
            </div>

            {/* 大項目提示 */}
            {pForm.rateType==="group"&&(
              <div style={{background:"#fff1f0",border:"1.5px solid #fca5a5",borderRadius:12,padding:"12px 14px",marginBottom:13}}>
                <div style={{fontWeight:800,color:"#e11d48",fontSize:13,marginBottom:4}}>📋 大項目代購模式</div>
                <div style={{fontSize:12,color:"#7a5c5c",lineHeight:1.6}}>
                  客人點進去後自己填現地日幣標價<br/>
                  系統依匯率自動換算台幣（最終由你確認）<br/>
                  適合：吉伊卡哇、拉麵店、景點限定品等
                </div>
                <div style={{marginTop:10}}>
                  <label className="LS">使用匯率</label>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
                    {[["general","一般 0.26"],["ticket","門票 0.28"],["souvenir","土產 0.27"]].map(([k,l])=>(
                      <button key={k} onClick={()=>setPForm(p=>({...p,groupRateType:k}))} className="tap"
                        style={{padding:"7px 4px",borderRadius:10,border:`2px solid ${pForm.groupRateType===k?RATE_TYPES[k].color:"#f5e6d8"}`,background:pForm.groupRateType===k?RATE_TYPES[k].color+"15":"#fff",cursor:"pointer",fontFamily:"inherit",textAlign:"center"}}>
                        <div style={{fontWeight:800,fontSize:11,color:pForm.groupRateType===k?RATE_TYPES[k].color:"#8a6a5a"}}>{l}</div>
                      </button>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {pForm.rateType==="gacha"&&(
              <div style={{background:"#fdf4ff",border:"1.5px solid #e9d5ff",borderRadius:14,padding:"14px",marginBottom:13}}>
                <div style={{fontWeight:800,color:"#7e22ce",fontSize:13,marginBottom:10}}>🎰 扭蛋定價表（點選）</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:10}}>
                  {GACHA_PRICES.map(g=>(
                    <div key={g.jpy} onClick={()=>setPForm(p=>({...p,price:String(g.jpy)}))} className="tap"
                      style={{background:pForm.price===String(g.jpy)?"#a855f7":"#fff",borderRadius:10,padding:"8px 10px",border:`1.5px solid ${pForm.price===String(g.jpy)?"#a855f7":"#e9d5ff"}`,cursor:"pointer",textAlign:"center"}}>
                      <div style={{fontWeight:900,color:pForm.price===String(g.jpy)?"#fff":"#7e22ce",fontSize:14}}>{g.jpy}¥</div>
                      <div style={{fontWeight:700,color:pForm.price===String(g.jpy)?"rgba(255,255,255,.8)":"#a855f7",fontSize:12}}>NT${g.twd}</div>
                    </div>
                  ))}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <button onClick={()=>setPForm(p=>({...p,keepShell:!p.keepShell}))} className="tap"
                    style={{width:44,height:24,borderRadius:12,border:"none",cursor:"pointer",background:pForm.keepShell?"#a855f7":"#d1d5db",position:"relative",flexShrink:0}}>
                    <div style={{width:18,height:18,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:pForm.keepShell?22:3,transition:"left .2s"}}/>
                  </button>
                  <span style={{fontSize:13,color:pForm.keepShell?"#7e22ce":"#b8887a",fontWeight:700}}>{pForm.keepShell?"留蛋殼（+NT$5）":"只留蛋紙"}</span>
                </div>
                {pForm.price&&<div style={{marginTop:10,background:"#fff",borderRadius:10,padding:"8px 12px",fontSize:13,color:"#7e22ce",fontWeight:700}}>💰 售價：NT${gachaTWD(+pForm.price,pForm.keepShell)}</div>}
              </div>
            )}
            {pForm.rateType!=="gacha"&&(
              <div style={{marginBottom:13}}>
                <label className="LS">自訂匯率（選填，覆蓋類型匯率）</label>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <input className="IS" type="number" step="0.001" value={pForm.customRate} onChange={e=>setPForm(p=>({...p,customRate:e.target.value}))} placeholder={`預設 ${RATE_TYPES[pForm.rateType]?.rate||0.26}`} style={{flex:1}}/>
                  {pForm.customRate&&<span style={{color:"#b5622e",fontWeight:700,fontSize:13,whiteSpace:"nowrap"}}>= NT${pForm.price?Math.ceil(+pForm.price*(+pForm.customRate)).toLocaleString():"?"}</span>}
                </div>
              </div>
            )}
            <div style={{marginBottom:22,display:"flex",alignItems:"center",gap:12}}>
              <label style={{fontSize:13,fontWeight:800,color:"#374151"}}>上架販售</label>
              <button onClick={()=>setPForm(p=>({...p,inStock:!p.inStock}))} className="tap"
                style={{width:52,height:28,borderRadius:14,border:"none",cursor:"pointer",background:pForm.inStock?"#c8756a":"#d1d5db",position:"relative"}}>
                <div style={{width:22,height:22,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:pForm.inStock?26:4,transition:"left .2s",boxShadow:"0 1px 4px rgba(0,0,0,.2)"}}/>
              </button>
              <span style={{fontSize:13,color:pForm.inStock?"#22c55e":"#94a3b8",fontWeight:700}}>{pForm.inStock?"販售中":"已下架"}</span>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setShowPF(false)} className="tap btn-gray" style={{flex:1}}>取消</button>
              <button onClick={submitP} className="tap btn-blue" style={{flex:2}}>{editP?"儲存變更":"新增商品"}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ══ ROOT ═════════════════════════════════════
function App(){
  const [screen,setScreen]=useState("home");
  const [loggedIn,setLoggedIn]=useState(false);
  const [loading,setLoading]=useState(true);

  // All state starts from localStorage cache, then Firebase updates it
  const [orders,setOrdersR]    =useState(()=>load("orders",[]));
  const [clients,setClientsR]  =useState(()=>load("clients",[{clientCode:"A001",name:"小美"},{clientCode:"B002",name:"阿志"},{clientCode:"C003",name:"小花"}]));
  const [products,setProductsR]=useState(()=>load("products",[
    {id:1,name:"資生堂防曬乳 SPF50",price:2800,currency:"JPY",category:"美妝保養",desc:"75ml",inStock:true,image:null,rateType:"general"},
    {id:2,name:"Nike Air Max 2024",price:12000,currency:"JPY",category:"服飾鞋包",desc:"多色多尺寸",inStock:true,image:null,rateType:"general"},
  ]));
  const [sellRates,setSellRatesR] =useState(()=>load("sellRates",SELL_RATES0));
  const [wallets,setWalletsR]     =useState(()=>load("wallets",{}));
  const [wishlists,setWishlistsR] =useState(()=>load("wishlists",{}));
  const [pending,setPendingR]     =useState(()=>load("pending",[]));
  const [announce,setAnnounceR]   =useState(()=>load("announce",{title:"歡迎使用代購管理系統",body:"即時追蹤每筆訂單的購買狀態！"}));
  const [stockItems,setStockItemsR]=useState(()=>load("stockItems",[]));
  const [liveRates,setLiveRates]  =useState(BASE_RATES);

  // ── Firebase write helpers ──────────────────
  function fbSave(col, data){ db.collection("shopdata").doc(col).set({data:JSON.stringify(data)}); }

  function setOrders(v)   { const nv=typeof v==="function"?v(orders):v;    setOrdersR(nv);    save("orders",nv);    fbSave("orders",nv); }
  function setClients(v)  { const nv=typeof v==="function"?v(clients):v;   setClientsR(nv);   save("clients",nv);   fbSave("clients",nv); }
  function setProducts(v) { const nv=typeof v==="function"?v(products):v;  setProductsR(nv);  save("products",nv);  fbSave("products",nv); }
  function setSellRates(v){ const nv=typeof v==="function"?v(sellRates):v; setSellRatesR(nv); save("sellRates",nv); fbSave("sellRates",nv); }
  function setWallets(v)  { const nv=typeof v==="function"?v(wallets):v;   setWalletsR(nv);   save("wallets",nv);   fbSave("wallets",nv); }
  function setWishlists(v){ const nv=typeof v==="function"?v(wishlists):v; setWishlistsR(nv); save("wishlists",nv); fbSave("wishlists",nv); }
  function setPending(v)  { const nv=typeof v==="function"?v(pending):v;   setPendingR(nv);   save("pending",nv);   fbSave("pending",nv); }
  function setAnnounce(v) { const nv=typeof v==="function"?v(announce):v;  setAnnounceR(nv);  save("announce",nv);  fbSave("announce",nv); }
  function setStockItems(v){ const nv=typeof v==="function"?v(stockItems):v; setStockItemsR(nv); save("stockItems",nv); fbSave("stockItems",nv); }

  // ── Firebase real-time listeners ────────────
  useEffect(()=>{
    const keys=["orders","clients","products","sellRates","wallets","wishlists","pending","announce","stockItems"];
    const setters={orders:setOrdersR,clients:setClientsR,products:setProductsR,sellRates:setSellRatesR,wallets:setWalletsR,wishlists:setWishlistsR,pending:setPendingR,announce:setAnnounceR,stockItems:setStockItemsR};
    const unsubs=keys.map(key=>
      db.collection("shopdata").doc(key).onSnapshot(snap=>{
        if(snap.exists){
          try{
            const data=JSON.parse(snap.data().data);
            setters[key](data);
            save(key,data);
          }catch(e){}
        }
        setLoading(false);
      },()=>setLoading(false))
    );
    // Also stop loading after 3s even if Firebase is slow
    const t=setTimeout(()=>setLoading(false),3000);
    return ()=>{ unsubs.forEach(u=>u()); clearTimeout(t); };
  },[]);

  // ── Live exchange rate ticker ────────────────
  useEffect(()=>{
    const id=setInterval(()=>setLiveRates(p=>({...p,JPY:+(p.JPY+(Math.random()-.5)*.002).toFixed(4),USD:+(p.USD+(Math.random()-.5)*.05).toFixed(3)})),5000);
    return ()=>clearInterval(id);
  },[]);

  if(loading) return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"linear-gradient(160deg,#fdf6ee,#fff8f0,#fef3e8)"}}>
      <div style={{fontSize:56,marginBottom:16}}>🛍️</div>
      <div style={{fontWeight:900,fontSize:20,color:"#2d1f1a",marginBottom:8}}>ShopTrack</div>
      <div style={{fontSize:14,color:"#b8887a",marginBottom:24}}>正在連接雲端資料...</div>
      <div style={{width:48,height:48,border:"4px solid #f0d9cc",borderTopColor:"#c8756a",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );

  if(screen==="home") return <Home onAgent={()=>setScreen("agent")} onClient={()=>setScreen("client")} announce={announce}/>;
  if(screen==="client") return <ClientView orders={orders} setOrders={setOrders} clients={clients} setClients={setClients} products={products} sellRates={sellRates} wallets={wallets} setWallets={setWallets} wishlists={wishlists} setWishlists={setWishlists} pending={pending} setPending={setPending} announce={announce} stockItems={stockItems} setStockItems={setStockItems} onBack={()=>setScreen("home")}/>;
  if(screen==="agent"&&!loggedIn) return <AgentLogin onLogin={()=>setLoggedIn(true)} onBack={()=>setScreen("home")}/>;
  return <AgentDash orders={orders} setOrders={setOrders} clients={clients} setClients={setClients} products={products} setProducts={setProducts} onLogout={()=>{setLoggedIn(false);setScreen("home");}} liveRates={liveRates} sellRates={sellRates} setSellRates={setSellRates} wallets={wallets} setWallets={setWallets} wishlists={wishlists} setWishlists={setWishlists} pending={pending} setPending={setPending} announce={announce} setAnnounce={setAnnounce} stockItems={stockItems} setStockItems={setStockItems}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
