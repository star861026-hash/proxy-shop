<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>ShopTrack 代購管理系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:linear-gradient(160deg,#e8f4fd,#f0f8ff,#e8f0fb);min-height:100vh}
.card{background:#fff;border-radius:18px;box-shadow:0 2px 16px rgba(100,160,220,.10)}
.tap{cursor:pointer;transition:transform .1s,opacity .1s}
.tap:active{transform:scale(.97);opacity:.85}
.tab-btn{border:none;background:none;cursor:pointer;padding:10px 0;font-size:13px;font-weight:700;color:#aac4dd;position:relative;white-space:nowrap;font-family:inherit}
.tab-btn.active{color:#4a9fd4}
.tab-btn.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2.5px;background:#4a9fd4;border-radius:2px}
.gold{color:#c8900a;font-weight:800}
.chip{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:800}
input,select,textarea{font-family:inherit;outline:none;box-sizing:border-box}
input:focus,select:focus,textarea:focus{border-color:#4a9fd4!important;box-shadow:0 0 0 3px rgba(74,159,212,.12)}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
@keyframes toastIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(60px)}to{opacity:1;transform:translateY(0)}}
.modal-overlay{position:fixed;inset:0;background:rgba(20,60,100,.25);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:flex-end;justify-content:center}
.modal-box{background:#fff;border-radius:24px 24px 0 0;padding:20px 20px 40px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(50,120,200,.15);animation:slideUp .3s ease}
.modal-handle{width:40px;height:4px;background:#d8eaf5;border-radius:4px;margin:0 auto 18px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.IS{width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid #d8eaf5;font-size:14px;color:#1a2a3a;font-family:inherit}
.LS{font-size:12px;font-weight:800;color:#8aabcc;display:block;margin-bottom:6px}
.btn-blue{padding:13px;border-radius:14px;border:none;background:linear-gradient(135deg,#4a9fd4,#6bb8e8);color:#fff;font-weight:900;cursor:pointer;font-size:14px;font-family:inherit;box-shadow:0 4px 14px rgba(74,159,212,.3)}
.btn-gray{padding:13px;border-radius:14px;border:1.5px solid #d8eaf5;background:#f7fbff;font-weight:700;cursor:pointer;font-size:14px;color:#8aabcc;font-family:inherit}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef} = React;

// ══ 設定區（可修改）══════════════════════════
const AGENT_EMAIL    = "star861026@gmail.com";
const AGENT_PASSWORD = "wing354126";
const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1493585125311778828/v4qhssKY5KZPVqZZ3eBXux_NzPq3nLIJ10fnBVKu4dOv_67ZSMRHZ7VPXH7olTQ1wBLG";
// ════════════════════════════════════════════

const CURRENCIES = ["TWD","JPY","USD","KRW","HKD","EUR"];
const BASE_RATES  = {TWD:1,JPY:0.215,USD:32.1,KRW:0.024,HKD:4.1,EUR:34.5};
const SELL_RATES0 = {TWD:1,JPY:0.26,USD:34.0,KRW:0.027,HKD:4.5,EUR:37.0};

const RATE_TYPES = {
  general: {label:"一般商品",   rate:0.26, color:"#4a9fd4"},
  ticket:  {label:"需門票商品", rate:0.28, color:"#f59e0b"},
  souvenir:{label:"土產/大型",  rate:0.27, color:"#22c55e"},
  gacha:   {label:"扭蛋",       rate:null, color:"#a855f7"},
  group:   {label:"大項目代購", rate:null, color:"#e11d48"},
};

const GACHA_PRICES = [
  {jpy:200,twd:60},{jpy:300,twd:80},{jpy:400,twd:110},{jpy:500,twd:140}
];
function gachaTWD(jpy,keepShell){
  const r=GACHA_PRICES.find(x=>x.jpy===+jpy);
  return (r?r.twd:Math.round(+jpy*0.26))+(keepShell?5:0);
}

const MEMBER_LEVELS = [
  {name:"鑽石會員",minDeposit:6000,cashback:0.02,ticketRate:0.27,souvenirRate:0.26,gift:true, color:"#60a5fa",icon:"💎"},
  {name:"黃金會員",minDeposit:4000,cashback:0.01,ticketRate:0.27,souvenirRate:0.27,gift:true, color:"#f59e0b",icon:"🥇"},
  {name:"白銀會員",minDeposit:2000,cashback:0.01,ticketRate:0.28,souvenirRate:0.27,gift:false,color:"#8aabcc",icon:"🥈"},
  {name:"一般會員",minDeposit:0,   cashback:0,   ticketRate:0.28,souvenirRate:0.27,gift:false,color:"#b0cde0",icon:"👤"},
];
function getMemberLevel(dep){return MEMBER_LEVELS.find(l=>dep>=l.minDeposit)||MEMBER_LEVELS[3];}
function getLotteryTickets(spent){return Math.floor(spent/888);}

const STATUS = {
  pending:{label:"待購買",color:"#f59e0b",bg:"#fef9ec",icon:"⏳"},
  bought: {label:"已買到",color:"#22c55e",bg:"#f0fdf4",icon:"✅"},
  shipped:{label:"已寄出",color:"#60a5fa",bg:"#eff6ff",icon:"🚚"},
  arrived:{label:"已到台灣",color:"#a78bfa",bg:"#f5f3ff",icon:"📦"},
};
const CATS=["全部","美妝保養","服飾鞋包","食品零食","生活用品","電子產品","扭蛋","其他"];
const CAT_ICON={"美妝保養":"💄","服飾鞋包":"👟","食品零食":"🍬","生活用品":"🏠","電子產品":"📱","扭蛋":"🎰","其他":"📦"};

function toTWD(a,c,r){return Math.round(a*(r[c]||1));}
function productTWD(p,sr){
  if(p.customRate) return Math.round(p.price*p.customRate);
  if(p.rateType==="gacha") return gachaTWD(p.price,p.keepShell);
  if(p.rateType&&RATE_TYPES[p.rateType]&&RATE_TYPES[p.rateType].rate) return Math.round(p.price*RATE_TYPES[p.rateType].rate);
  return toTWD(p.price,p.currency,sr);
}

// localStorage
const LSK=k=>`shoptrack_${k}`;
function load(k,d){try{const v=localStorage.getItem(LSK(k));return v?JSON.parse(v):d;}catch{return d;}}
function save(k,v){try{localStorage.setItem(LSK(k),JSON.stringify(v));}catch{}}

// Discord
async function notifyDiscord(msg){
  try{await fetch(DISCORD_WEBHOOK,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({content:msg})});}
  catch(e){console.log("DC error",e);}
}

// Shared hooks
function useToast(){
  const [t,setT]=useState(null);
  const show=useCallback((msg,type="success")=>{setT({msg,type});setTimeout(()=>setT(null),2600);},[]);
  return[t,show];
}
function useImg(init=null){
  const [img,setImg]=useState(init);
  const ref=useRef();
  function pick(){ref.current?.click();}
  function onChange(e){const f=e.target.files?.[0];if(!f)return;const r=new FileReader();r.onload=ev=>setImg(ev.target.result);r.readAsDataURL(f);e.target.value="";}
  return{img,setImg,ref,pick,onChange};
}

// Shared UI
function Toast({t}){
  if(!t)return null;
  return <div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",zIndex:9999,
    background:t.type==="error"?"#fff1f1":"#fffbea",border:`1.5px solid ${t.type==="error"?"#fca5a5":"#f6d860"}`,
    color:t.type==="error"?"#b91c1c":"#92600a",padding:"10px 22px",borderRadius:30,fontWeight:700,fontSize:13,
    boxShadow:"0 4px 20px rgba(0,0,0,.1)",whiteSpace:"nowrap",animation:"toastIn .25s ease"}}>{t.msg}</div>;
}
function ImgBox({img,onPick,iref,onChange,label="點擊上傳圖片",h=140}){
  return(
    <div onClick={onPick} className="tap" style={{width:"100%",height:h,borderRadius:14,overflow:"hidden",cursor:"pointer",
      background:img?"transparent":"#f0f8ff",border:`2px dashed ${img?"transparent":"#b0cde0"}`,
      display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
      {img?<img src={img} alt="" style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:12}}/>
        :<div style={{textAlign:"center",color:"#8aabcc"}}><div style={{fontSize:28,marginBottom:6}}>📷</div><div style={{fontSize:12,fontWeight:700}}>{label}</div></div>}
      {img&&<div style={{position:"absolute",bottom:8,right:8,background:"rgba(0,0,0,.45)",borderRadius:8,padding:"4px 10px",fontSize:11,color:"#fff",fontWeight:700}}>更換</div>}
      <input ref={iref} type="file" accept="image/*" onChange={onChange} style={{display:"none"}}/>
    </div>
  );
}

// ══ HOME ════════════════════════════════════
function Home({onAgent,onClient}){
  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{textAlign:"center",marginBottom:36,animation:"fadeUp .4s ease"}}>
        <div style={{fontSize:64}}>🛍️</div>
        <div style={{fontWeight:900,fontSize:28,color:"#1a2a3a",marginTop:8}}>ShopTrack</div>
        <div style={{fontSize:14,color:"#8aabcc",marginTop:4}}>代購管理系統</div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:14,width:"100%",maxWidth:320}}>
        <button onClick={onAgent} className="tap" style={{padding:"18px 0",borderRadius:18,border:"none",background:"linear-gradient(135deg,#4a9fd4,#6bb8e8)",color:"#fff",fontWeight:900,fontSize:17,cursor:"pointer",boxShadow:"0 4px 20px rgba(74,159,212,.35)",fontFamily:"inherit"}}>🏪 闆闆登入</button>
        <button onClick={onClient} className="tap" style={{padding:"18px 0",borderRadius:18,border:"1.5px solid #d8eaf5",background:"#fff",color:"#4a9fd4",fontWeight:900,fontSize:17,cursor:"pointer",fontFamily:"inherit"}}>👤 客人查詢 / 點單</button>
      </div>
    </div>
  );
}

// ══ AGENT LOGIN ══════════════════════════════
function AgentLogin({onLogin,onBack}){
  const [em,setEm]=useState("");const [pw,setPw]=useState("");
  const [showPw,setShowPw]=useState(false);const [err,setErr]=useState("");const [shake,setShake]=useState(false);
  function doLogin(){
    if(em.trim()===AGENT_EMAIL&&pw===AGENT_PASSWORD){onLogin();}
    else{setErr("Email 或密碼錯誤");setShake(true);setTimeout(()=>setShake(false),500);}
  }
  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20,position:"relative"}}>
      <button onClick={onBack} style={{position:"absolute",top:20,left:20,background:"none",border:"none",color:"#4a9fd4",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>← 返回</button>
      <div style={{textAlign:"center",marginBottom:24}}><div style={{fontSize:48}}>👑</div><div style={{fontWeight:900,fontSize:22,color:"#1a2a3a"}}>闆闆登入</div></div>
      <div className="card" style={{padding:"28px 24px",width:"100%",maxWidth:360,animation:shake?"shake .5s ease":"fadeUp .4s ease"}}>
        <div style={{marginBottom:14}}><label className="LS">Email</label><input className="IS" value={em} onChange={e=>setEm(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()} placeholder="輸入 Email"/></div>
        <div style={{marginBottom:err?10:20}}>
          <label className="LS">密碼</label>
          <div style={{position:"relative"}}>
            <input className="IS" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()} type={showPw?"text":"password"} placeholder="請輸入密碼" style={{paddingRight:46}}/>
            <button onClick={()=>setShowPw(p=>!p)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:20}}>{showPw?"🙈":"👁️"}</button>
          </div>
        </div>
        {err&&<div style={{background:"#fff1f1",border:"1px solid #fca5a5",borderRadius:10,padding:"8px 12px",color:"#b91c1c",fontSize:13,fontWeight:700,marginBottom:14}}>⚠️ {err}</div>}
        <button onClick={doLogin} className="tap btn-blue" style={{width:"100%",fontSize:15}}>登入</button>
      </div>
    </div>
  );
}

// ══ WALLET CARD (client) ═════════════════════
function WalletTab({nick,orders,myWallet,walletBal,cart,sellRates}){
  const logs=(myWallet.logs||[]);
  const totalDeposit=logs.filter(l=>l.type==="add").reduce((s,l)=>s+l.amount,0);
  const totalSpent=orders.filter(o=>o.clientName===nick).reduce((s,o)=>s+productTWD(o,sellRates),0);
  const level=getMemberLevel(totalDeposit);
  const tickets=getLotteryTickets(totalSpent);
  const hasFreeShip=walletBal>0||totalSpent>=3000;
  const cartSum=cart.reduce((s,i)=>s+productTWD(i.product,sellRates)*i.qty,0);
  const cashback=level.cashback>0?Math.floor(cartSum*level.cashback):0;
  const nextLevel=MEMBER_LEVELS.slice().reverse().find(l=>l.minDeposit>totalDeposit);
  return(
    <div>
      {/* Level card */}
      <div style={{background:`linear-gradient(135deg,${level.color}bb,${level.color})`,borderRadius:20,padding:"20px",marginBottom:14,boxShadow:`0 4px 20px ${level.color}44`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
          <div>
            <div style={{fontSize:12,color:"rgba(255,255,255,.8)",fontWeight:700}}>會員等級</div>
            <div style={{fontWeight:900,fontSize:22,color:"#fff",marginTop:2}}>{level.icon} {level.name}</div>
            {level.minDeposit>0&&<div style={{fontSize:11,color:"rgba(255,255,255,.75)",marginTop:2}}>累計儲值 NT${totalDeposit.toLocaleString()}</div>}
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:12,color:"rgba(255,255,255,.8)"}}>💰 購物金</div>
            <div style={{fontWeight:900,fontSize:26,color:"#fff"}}>NT${walletBal.toLocaleString()}</div>
          </div>
        </div>
        <div style={{background:"rgba(255,255,255,.2)",borderRadius:12,padding:"10px 14px"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,fontSize:12,color:"#fff"}}>
            <div>💱 一般：<b>0.26</b></div>
            <div>🎫 門票：<b>{level.ticketRate}</b></div>
            <div>🍱 土產：<b>{level.souvenirRate}</b></div>
            <div>💸 回饋：<b>{level.cashback>0?`${level.cashback*100}%`:"無"}</b></div>
            <div>🚚 免運：<b>{hasFreeShip?"✅":"未達"}</b></div>
            <div>🎁 禮物：<b>{level.gift?"✅":"無"}</b></div>
          </div>
        </div>
      </div>
      {/* Progress */}
      {nextLevel?(
        <div className="card" style={{padding:"14px 16px",marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
            <div style={{fontSize:13,fontWeight:700,color:"#1a2a3a"}}>距離 {nextLevel.icon}{nextLevel.name}</div>
            <div style={{fontSize:13,color:"#8aabcc"}}>還差 NT${(nextLevel.minDeposit-totalDeposit).toLocaleString()}</div>
          </div>
          <div style={{height:8,background:"#e8f4fb",borderRadius:4,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${Math.min(100,Math.round(totalDeposit/nextLevel.minDeposit*100))}%`,background:`linear-gradient(135deg,${nextLevel.color},${nextLevel.color}99)`,borderRadius:4}}/>
          </div>
        </div>
      ):(
        <div style={{background:"#f0fdf4",borderRadius:14,padding:"10px 14px",marginBottom:14,fontSize:13,color:"#166534",fontWeight:700,textAlign:"center"}}>🎉 已達最高等級！</div>
      )}
      {/* Lottery */}
      {tickets>0&&(
        <div style={{background:"linear-gradient(135deg,#fdf4ff,#fae8ff)",border:"1.5px solid #e9d5ff",borderRadius:14,padding:"12px 16px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontWeight:800,color:"#7e22ce",fontSize:14}}>🎟️ 抽獎券</div><div style={{fontSize:12,color:"#a855f7",marginTop:2}}>每消費滿 NT$888 送 1 張</div></div>
          <div style={{fontWeight:900,fontSize:28,color:"#7e22ce"}}>{tickets} 張</div>
        </div>
      )}
      {/* Cashback preview */}
      {cart.length>0&&cashback>0&&(
        <div style={{background:"#f0fdf4",border:"1.5px solid #86efac",borderRadius:14,padding:"12px 16px",marginBottom:14}}>
          <div style={{fontSize:13,color:"#166534",fontWeight:700}}>🛒 本次回饋預估</div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:6,fontSize:13}}>
            <span style={{color:"#6a90aa"}}>NT${cartSum.toLocaleString()}</span>
            <span style={{fontWeight:900,color:"#22c55e"}}>回饋 -NT${cashback.toLocaleString()}</span>
            <span style={{fontWeight:900,color:"#1a2a3a"}}>= NT${(cartSum-cashback).toLocaleString()}</span>
          </div>
          <div style={{fontSize:11,color:"#8aabcc",marginTop:4}}>⚠️ 最終金額由業者確認</div>
        </div>
      )}
      {/* Logs */}
      <div style={{fontWeight:800,color:"#1a2a3a",fontSize:15,marginBottom:10}}>交易明細</div>
      {logs.length===0
        ?<div className="card" style={{padding:32,textAlign:"center",color:"#b0cde0"}}><div style={{fontSize:36}}>📒</div><div style={{fontWeight:700,marginTop:8}}>還沒有交易記錄</div></div>
        :<div style={{display:"flex",flexDirection:"column",gap:8}}>
          {[...logs].reverse().map(log=>(
            <div key={log.id} className="card" style={{padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{fontWeight:700,color:"#1a2a3a",fontSize:14}}>{log.note}</div><div style={{fontSize:11,color:"#8aabcc",marginTop:2}}>{log.date}</div></div>
              <div style={{fontWeight:900,fontSize:16,color:log.amount>0?"#22c55e":"#ef4444"}}>{log.amount>0?"+":""}NT${Math.abs(log.amount).toLocaleString()}</div>
            </div>
          ))}
        </div>
      }
    </div>
  );
}

// ══ CLIENT WALLET CARD (agent) ═══════════════
function ClientCard({c,orders,wallets,setWallets,setClients,showToast}){
  const [showW,setShowW]=useState(false);
  const [amt,setAmt]=useState("");const [note,setNote]=useState("");
  const w=wallets[c.clientCode]||{balance:0,logs:[]};
  const n=orders.filter(o=>o.clientCode===c.clientCode).length;
  const totalDep=(w.logs||[]).filter(l=>l.type==="add").reduce((s,l)=>s+l.amount,0);
  const lv=getMemberLevel(totalDep);
  function doTopup(type){
    const a=parseInt(amt);if(!a||a<=0)return;
    const now=new Date().toISOString().split("T")[0];
    const delta=type==="add"?a:-a;
    const newBal=(w.balance||0)+delta;
    if(newBal<0){showToast("餘額不足","error");return;}
    const newLog={id:Date.now(),date:now,type,amount:delta,note:note||(type==="add"?"充值":"扣款")};
    setWallets(p=>({...p,[c.clientCode]:{balance:newBal,logs:[...(w.logs||[]),newLog]}}));
    setAmt("");setNote("");
    showToast(type==="add"?`已充值 NT$${a.toLocaleString()} 🎉`:`已扣款 NT$${a.toLocaleString()}`);
  }
  return(
    <div className="card" style={{overflow:"hidden"}}>
      <div style={{padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:38,height:38,borderRadius:11,background:"linear-gradient(135deg,#bae6fd,#4a9fd4)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>👤</div>
          <div>
            <div style={{fontWeight:800,color:"#1a2a3a",fontSize:15}}>{c.name} <span style={{fontSize:12,color:lv.color,fontWeight:700}}>{lv.icon}{lv.name}</span></div>
            <div style={{fontSize:12,color:"#8aabcc"}}>{n} 筆　<span style={{color:"#c8900a",fontWeight:700}}>💰 NT${(w.balance||0).toLocaleString()}</span></div>
          </div>
        </div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>setShowW(p=>!p)} className="tap" style={{padding:"6px 12px",borderRadius:10,border:"1.5px solid #d8eaf5",background:"#f7fbff",fontSize:12,cursor:"pointer",fontWeight:700,color:"#4a9fd4",fontFamily:"inherit"}}>{showW?"▲":"💰"}</button>
          <button onClick={()=>setClients(p=>p.filter(x=>x.clientCode!==c.clientCode))} className="tap" style={{padding:"6px 12px",borderRadius:10,border:"1.5px solid #fee2e2",background:"#fff8f8",fontSize:12,cursor:"pointer",fontWeight:700,color:"#f87171",fontFamily:"inherit"}}>🗑️</button>
        </div>

      {showW&&(
        <div style={{background:"#fffbea",borderTop:"1.5px solid #f6d860",padding:"14px 16px"}}>
          <div style={{fontWeight:800,color:"#1a2a3a",fontSize:14,marginBottom:10}}>💰 購物金管理</div>
          <div style={{background:"#fef9ec",borderRadius:12,padding:"10px 14px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:13,color:"#92600a",fontWeight:700}}>目前餘額</span>
            <span style={{fontWeight:900,color:"#c8900a",fontSize:20}}>NT${(w.balance||0).toLocaleString()}</span>
          </div>
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            <input className="IS" type="number" value={amt} onChange={e=>setAmt(e.target.value)} placeholder="金額（NT$）" style={{flex:2}}/>
            <input className="IS" value={note} onChange={e=>setNote(e.target.value)} placeholder="備註" style={{flex:3}}/>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>doTopup("add")} className="tap" style={{flex:1,padding:"10px 0",borderRadius:10,border:"none",background:"linear-gradient(135deg,#22c55e,#4ade80)",color:"#fff",fontWeight:800,cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>＋ 充值</button>
            <button onClick={()=>doTopup("deduct")} className="tap" style={{flex:1,padding:"10px 0",borderRadius:10,border:"1.5px solid #fee2e2",background:"#fff8f8",color:"#ef4444",fontWeight:800,cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>− 扣款</button>
          </div>
          {(w.logs||[]).length>0&&(
            <div style={{marginTop:12}}>
              <div style={{fontSize:12,color:"#8aabcc",fontWeight:700,marginBottom:6}}>最近交易</div>
              {[...(w.logs||[])].reverse().slice(0,5).map(log=>(
                <div key={log.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #f6d860",fontSize:12}}>
                  <span style={{color:"#7a5c1a"}}>{log.note} · {log.date}</span>
                  <span style={{fontWeight:800,color:log.amount>0?"#22c55e":"#ef4444"}}>{log.amount>0?"+":""}NT${Math.abs(log.amount).toLocaleString()}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ══ GROUP ITEM ROW ════════════════════════════
function GroupItemRow({item,idx,onChange,onRemove,canRemove,sellRates,groupProduct,wallets,client}){
  const imgRef=useRef();
  const w=wallets[client?.clientCode]||{balance:0,logs:[]};
  const dep=(w.logs||[]).filter(l=>l.type==="add").reduce((s,l)=>s+l.amount,0);
  const lv=getMemberLevel(dep);
  const rate=groupProduct.rateType==="souvenir"?lv.souvenirRate:(RATE_TYPES[groupProduct.rateType]?.rate||0.26);
  const twd=item.price?Math.round(+item.price*rate):0;

  function handleImg(e){
    const f=e.target.files?.[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>onChange("image",ev.target.result);r.readAsDataURL(f);e.target.value="";
  }

  return(
    <div style={{background:"#f7fbff",borderRadius:14,padding:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{fontWeight:700,color:"#4a9fd4",fontSize:13}}>商品 {idx+1}</div>
        {canRemove&&<button onClick={onRemove} style={{background:"none",border:"none",color:"#f87171",cursor:"pointer",fontSize:16}}>🗑️</button>}
      </div>
      {/* Image upload */}
      <div onClick={()=>imgRef.current?.click()} className="tap"
        style={{width:"100%",height:90,borderRadius:12,overflow:"hidden",cursor:"pointer",background:item.image?"transparent":"#f0f8ff",border:`2px dashed ${item.image?"transparent":"#b0cde0"}`,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:10,position:"relative"}}>
        {item.image?<img src={item.image} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
          :<div style={{textAlign:"center",color:"#8aabcc"}}><div style={{fontSize:22}}>📷</div><div style={{fontSize:11,fontWeight:700}}>上傳商品圖片</div></div>}
        {item.image&&<div style={{position:"absolute",bottom:6,right:6,background:"rgba(0,0,0,.45)",borderRadius:6,padding:"2px 8px",fontSize:10,color:"#fff"}}>更換</div>}
        <input ref={imgRef} type="file" accept="image/*" onChange={handleImg} style={{display:"none"}}/>
      </div>
      <div style={{marginBottom:8}}><input className="IS" value={item.name} onChange={e=>onChange("name",e.target.value)} placeholder="商品名稱（例：北海道牛奶糖）" style={{fontSize:13}}/></div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <input className="IS" type="number" value={item.price} onChange={e=>onChange("price",e.target.value)} placeholder="日幣價格" style={{flex:1,fontSize:13}}/>
        <span style={{color:"#8aabcc",fontSize:12}}>¥</span>
        {item.price&&<span style={{fontWeight:800,color:"#c8900a",fontSize:13,whiteSpace:"nowrap"}}>= NT${twd.toLocaleString()}</span>}
      </div>
      {item.price&&<div style={{fontSize:11,color:"#8aabcc",marginTop:6}}>匯率 {rate}（{lv.icon}{lv.name}）</div>}
    </div>
  );
}

// ══ CLIENT VIEW ══════════════════════════════
function ClientView({orders,setOrders,clients,setClients,products,sellRates,wallets,setWallets,wishlists,setWishlists,pending,setPending,onBack}){
  const [nick,setNick]=useState("");const [inp,setInp]=useState("");
  const [ctab,setCtab]=useState("catalog");const [cat,setCat]=useState("全部");
  const [cart,setCart]=useState([]);const [showCart,setShowCart]=useState(false);
  const [detail,setDetail]=useState(null);const [dQty,setDQty]=useState(1);const [dNote,setDNote]=useState("");
  const [showManual,setShowManual]=useState(false);const [mForm,setMForm]=useState({item:"",price:"",currency:"JPY",note:""});
  const [showWish,setShowWish]=useState(false);const [wForm,setWForm]=useState({item:"",note:""});
  const [showGroup,setShowGroup]=useState(null); // holds the group product being ordered
  const [groupItems,setGroupItems]=useState([{name:"",price:"",image:null,imgKey:Date.now()}]);
  const [toast,showToast]=useToast();
  const mImg=useImg();const dImg=useImg();const wImg=useImg();

  const client=clients.find(c=>c.name===nick);
  const myOrders=orders.filter(o=>o.clientName===nick);
  const myWallet=client?(wallets[client.clientCode]||{balance:0,logs:[]}):{balance:0,logs:[]};
  const walletBal=myWallet.balance||0;
  const cartCount=cart.reduce((s,i)=>s+i.qty,0);
  const cartTotal=cart.reduce((s,i)=>s+productTWD(i.product,sellRates)*i.qty,0);
  const visible=products.filter(p=>cat==="全部"||p.category===cat);

  function lookup(){
    if(!inp.trim()){showToast("請輸入名字","error");return;}
    const name=inp.trim();
    if(!clients.find(c=>c.name===name)){
      const code="U"+Date.now().toString().slice(-6);
      setClients(p=>{const np=[...p,{clientCode:code,name}];save("clients",np);return np;});
    }
    setNick(name);setCart([]);
  }

  function addToCart(product,qty,note,image=null){
    setCart(prev=>{
      const ex=prev.find(i=>i.product.id===product.id&&!image);
      if(ex&&!image)return prev.map(i=>i.product.id===product.id?{...i,qty:i.qty+qty,note:note||i.note}:i);
      return [...prev,{product,qty,note,image,cartId:Date.now()+Math.random()}];
    });
    showToast("已加入購物車 🛒");
  }
  function rmCart(id){setCart(p=>p.filter(i=>i.cartId!==id));}
  function updQty(id,d){setCart(p=>p.map(i=>i.cartId===id?{...i,qty:Math.max(1,i.qty+d)}:i));}

  function submitCart(){
    if(!cart.length)return;
    const now=new Date().toISOString().split("T")[0];
    const time=new Date().toLocaleString("zh-TW",{hour12:false});
    const nos=cart.map(item=>({id:Date.now()+Math.random(),clientCode:client.clientCode,clientName:client.name,
      item:item.product.name+(item.qty>1?` x${item.qty}`:""),price:item.product.price*item.qty,
      currency:item.product.currency,note:item.note,image:item.image||null,status:"pending",createdAt:now,updatedAt:now}));
    setOrders(p=>[...p,...nos]);
    const total=nos.reduce((s,o)=>s+productTWD(o,sellRates),0);
    const itemList=cart.map(i=>`　📦 ${i.product.name}${i.qty>1?` x${i.qty}`:""}${i.note?` (${i.note})`:""}`).join("\n");
    notifyDiscord(`🛍️ **新喊單通知！**\n👤 客人：**${client.name}**\n${itemList}\n💰 合計：NT$${total.toLocaleString()}\n🕐 ${time}`);
    const totalCost=nos.reduce((s,o)=>s+toTWD(o.price,o.currency,sellRates),0);
    if(totalCost>0&&walletBal>=totalCost){
      const newBal=walletBal-totalCost;
      setWallets(p=>({...p,[client.clientCode]:{balance:newBal,logs:[...(myWallet.logs||[]),{id:Date.now(),date:now,type:"deduct",amount:-totalCost,note:`下單扣款（${nos.length}件）`}]}}));
      showToast(`已送出，購物金扣除 NT$${totalCost.toLocaleString()} 🎉`);
    } else {
      showToast(`已送出 ${nos.length} 件需求 🎉`);
    }
    setCart([]);setShowCart(false);setCtab("orders");
  }

  function submitManual(){
    if(!mForm.item||!mForm.price){showToast("請填寫商品名稱和價格","error");return;}
    const now=new Date().toISOString().split("T")[0];
    const time=new Date().toLocaleString("zh-TW",{hour12:false});
    setOrders(p=>[...p,{id:Date.now(),clientCode:client.clientCode,clientName:client.name,
      item:mForm.item,price:+mForm.price,currency:mForm.currency,note:mForm.note,image:mImg.img,status:"pending",createdAt:now,updatedAt:now}]);
    notifyDiscord(`✍️ **手動喊單！**\n👤 **${client.name}**\n　📦 ${mForm.item}　${mForm.currency} ${mForm.price}${mForm.note?`\n　📝 ${mForm.note}`:""}\n🕐 ${time}`);
    setMForm({item:"",price:"",currency:"JPY",note:""});mImg.setImg(null);setShowManual(false);
    showToast("已送出需求 🎉");
  }

  return(
    <div style={{minHeight:"100vh",paddingBottom:80}}>
      <Toast t={toast}/>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#4a9fd4,#6bb8e8)",padding:"16px 20px 24px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:12,color:"rgba(255,255,255,.7)"}}>🛍️ ShopTrack</div>
            <div style={{fontWeight:900,fontSize:20,color:"#fff",marginTop:2}}>{nick?`👋 ${nick}`:"客人點單專區"}</div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {nick&&cartCount>0&&(
              <button onClick={()=>setShowCart(true)} className="tap" style={{position:"relative",background:"#fff",border:"none",borderRadius:14,padding:"8px 14px",fontWeight:800,cursor:"pointer",fontSize:13,color:"#4a9fd4",fontFamily:"inherit"}}>
                🛒 購物車
                <span style={{position:"absolute",top:-6,right:-6,background:"#ef4444",color:"#fff",borderRadius:"50%",width:20,height:20,fontSize:11,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center"}}>{cartCount}</span>
              </button>
            )}
            <button onClick={onBack} style={{background:"rgba(255,255,255,.2)",border:"none",borderRadius:10,padding:"7px 12px",color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>← 返回</button>
          </div>
        </div>
      </div>

      <div style={{padding:"16px 16px 0"}}>
        {!nick&&(
          <div className="card" style={{padding:20,marginTop:-12}}>
            <div style={{fontWeight:800,fontSize:15,color:"#1a2a3a",marginBottom:14}}>輸入你的群組暱稱</div>
            <div style={{display:"flex",gap:10}}>
              <input className="IS" value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&lookup()} placeholder="輸入群組暱稱" style={{flex:1}}/>
              <button onClick={lookup} className="tap" style={{background:"linear-gradient(135deg,#4a9fd4,#6bb8e8)",color:"#fff",border:"none",borderRadius:12,padding:"0 20px",fontWeight:800,cursor:"pointer",fontSize:14,fontFamily:"inherit",whiteSpace:"nowrap"}}>進入</button>
            </div>
          </div>
        )}

        {nick&&client&&(
          <>
            {/* Tabs */}
            <div style={{display:"flex",background:"#fff",borderRadius:14,padding:4,marginBottom:16,marginTop:-8,gap:4,boxShadow:"0 2px 12px rgba(100,160,220,.1)",overflowX:"auto"}}>
              {[["catalog","🛒 目錄"],["orders","📋 訂單"],["wish","⭐ 許願"],["wallet","💰 購物金"]].map(([k,l])=>(
                <button key={k} onClick={()=>setCtab(k)} className="tap"
                  style={{flex:1,padding:"10px 4px",borderRadius:11,border:"none",cursor:"pointer",fontWeight:800,fontSize:12,fontFamily:"inherit",whiteSpace:"nowrap",
                    background:ctab===k?"linear-gradient(135deg,#4a9fd4,#6bb8e8)":"transparent",
                    color:ctab===k?"#fff":"#8aabcc"}}>{l}</button>
              ))}
            </div>
            {walletBal>0&&ctab!=="wallet"&&(
              <div style={{background:"linear-gradient(135deg,#fef9ec,#fef3c7)",border:"1.5px solid #f6d860",borderRadius:14,padding:"10px 16px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{fontSize:13,color:"#92600a",fontWeight:700}}>💰 購物金餘額</div>
                <div style={{fontWeight:900,color:"#c8900a",fontSize:18}}>NT${walletBal.toLocaleString()}</div>
              </div>
            )}

            {/* CATALOG */}
            {ctab==="catalog"&&(
              <>
                <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4,marginBottom:14}}>
                  {CATS.map(c=>(
                    <button key={c} onClick={()=>setCat(c)} className="tap"
                      style={{padding:"7px 14px",borderRadius:16,border:"none",cursor:"pointer",fontWeight:700,fontSize:12,whiteSpace:"nowrap",fontFamily:"inherit",
                        background:cat===c?"#4a9fd4":"#fff",color:cat===c?"#fff":"#7ab3d0",
                        boxShadow:cat===c?"0 2px 8px rgba(74,159,212,.3)":"0 1px 4px rgba(100,160,220,.1)"}}>{c}</button>
                  ))}
                </div>
                {visible.length===0
                  ?<div className="card" style={{padding:40,textAlign:"center",color:"#b0cde0"}}><div style={{fontSize:36}}>📦</div><div style={{fontWeight:700,marginTop:8}}>此分類目前沒有商品</div></div>
                  :<div className="grid2">
                    {visible.map(p=>{
                      const sell=productTWD(p,sellRates);
                      const inCart=cart.filter(i=>i.product.id===p.id).reduce((s,i)=>s+i.qty,0);
                      return(
                        <div key={p.id} className="card tap" style={{overflow:"hidden",opacity:p.inStock?1:.6,cursor:p.inStock?"pointer":"default",position:"relative"}}
                          onClick={()=>{
                            if(!p.inStock)return;
                            if(p.rateType==="group"){
                              setShowGroup(p);
                              setGroupItems([{name:"",price:"",image:null,imgKey:Date.now()}]);
                            } else {
                              setDetail(p);setDQty(1);setDNote("");dImg.setImg(null);
                            }
                          }}>                          <div style={{width:"100%",height:130,background:"#f0f8ff",position:"relative",overflow:"hidden"}}>
                            {p.image?<img src={p.image} alt={p.name} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                              :<div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:40,color:"#b0cde0"}}>{CAT_ICON[p.category]||"📦"}</div>}
                            {!p.inStock&&<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.35)",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"#fff",fontWeight:900,fontSize:14}}>已售完</span></div>}
                            {inCart>0&&<div style={{position:"absolute",top:6,right:6,background:"#4a9fd4",color:"#fff",borderRadius:10,padding:"2px 8px",fontSize:11,fontWeight:800}}>已選 x{inCart}</div>}
                            {p.rateType&&<div style={{position:"absolute",top:6,left:6,background:RATE_TYPES[p.rateType]?.color||"#4a9fd4",color:"#fff",borderRadius:8,padding:"2px 6px",fontSize:10,fontWeight:700}}>{RATE_TYPES[p.rateType]?.label}</div>}
                          </div>
                          <div style={{padding:"10px 12px 12px"}}>
                            <div style={{fontWeight:800,fontSize:13,color:"#1a2a3a",lineHeight:1.3,marginBottom:4}}>{p.name}</div>
                            {p.desc&&<div style={{fontSize:11,color:"#8aabcc",marginBottom:6}}>{p.desc}</div>}
                            <div style={{fontWeight:900,color:"#c8900a",fontSize:14}}>NT${sell.toLocaleString()}</div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                }
                <button onClick={()=>setShowManual(true)} className="tap"
                  style={{width:"100%",marginTop:16,padding:"13px 0",borderRadius:14,border:"1.5px dashed #b0cde0",background:"transparent",color:"#8aabcc",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>
                  ＋ 找不到商品？手動輸入 / 上傳圖片
                </button>
              </>
            )}

            {/* ORDERS */}
            {ctab==="orders"&&(
              myOrders.length===0
                ?<div className="card" style={{padding:40,textAlign:"center",color:"#b0cde0"}}><div style={{fontSize:36}}>📋</div><div style={{fontWeight:700,marginTop:8}}>還沒有訂單</div></div>
                :<div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {[...myOrders].reverse().map(o=>{
                    const s=STATUS[o.status];const sell=productTWD(o,sellRates);
                    const steps=["pending","bought","shipped","arrived"];const prog=steps.indexOf(o.status);
                    return(
                      <div key={o.id} className="card" style={{overflow:"hidden"}}>
                        {o.image&&<img src={o.image} alt="" style={{width:"100%",height:140,objectFit:"cover"}}/>}
                        <div style={{padding:14}}>
                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                            <div style={{fontWeight:800,fontSize:15,color:"#1a2a3a",flex:1,marginRight:8}}>{o.item}</div>
                            <span className="chip" style={{background:s.bg,color:s.color,flexShrink:0}}>{s.icon} {s.label}</span>
                          </div>
                          <div style={{display:"flex",alignItems:"center",marginBottom:10}}>
                            {steps.map((st,i)=>(
                              <React.Fragment key={st}>
                                <div style={{width:20,height:20,borderRadius:"50%",flexShrink:0,background:i<=prog?STATUS[st].color:"#e8f4fb",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"#fff",fontWeight:900}}>{i<=prog?"✓":""}</div>
                                {i<steps.length-1&&<div style={{flex:1,height:3,margin:"0 3px",borderRadius:2,background:i<prog?"#4a9fd4":"#e8f4fb"}}/>}
                              </React.Fragment>
                            ))}
                          </div>
                          <div style={{display:"flex",gap:12,fontSize:12}}>
                            <span className="gold">{o.currency} {o.price.toLocaleString()}</span>
                            <span style={{color:"#b0cde0"}}>≈ NT${sell.toLocaleString()}</span>
                            <span style={{color:"#b0cde0"}}>{o.updatedAt}</span>
                          </div>
                          {o.note&&<div style={{marginTop:8,background:"#f7fbff",borderRadius:10,padding:"6px 10px",fontSize:12,color:"#6a90aa"}}>📝 {o.note}</div>}
                        </div>
                      </div>
                    );
                  })}
                </div>
            )}

            {/* WISHLIST */}
            {ctab==="wish"&&(
              <div>
                <div style={{background:"linear-gradient(135deg,#fdf4ff,#fae8ff)",border:"1.5px solid #e9d5ff",borderRadius:16,padding:"14px 16px",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div><div style={{fontWeight:800,color:"#7e22ce",fontSize:15}}>⭐ 許願清單</div><div style={{fontSize:12,color:"#a855f7",marginTop:2}}>許願後業者會幫你留意！</div></div>
                  <button onClick={()=>{setShowWish(true);setWForm({item:"",note:""});wImg.setImg(null);}} className="tap"

                </div>
                {(wishlists[client.clientCode]||[]).length===0
                  ?<div className="card" style={{padding:40,textAlign:"center",color:"#b0cde0"}}><div style={{fontSize:36}}>⭐</div><div style={{fontWeight:700,marginTop:8}}>還沒有許願</div></div>
                  :<div style={{display:"flex",flexDirection:"column",gap:10}}>
                    {(wishlists[client.clientCode]||[]).map(w=>(
                      <div key={w.id} className="card" style={{overflow:"hidden"}}>
                        {w.image&&<img src={w.image} alt="" style={{width:"100%",height:120,objectFit:"cover"}}/>}

                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                            <div style={{flex:1}}>

            <div style={{display:"flex",gap:10}}>

              <button onClick={()=>{
                const valid=groupItems.filter(i=>i.name.trim()&&i.price);

                notifyDiscord(`🛒 **${showGroup.name} 代購申請！**\n👤 **${client.name}** （${lv.icon}${lv.name}，土產匯率 ${rate}）\n${itemList}\n🕐 ${time}`);

      {showWish&&(

            <div style={{marginBottom:14}}><label className="LS">📷 商品圖片（選填）</label><ImgBox img={wImg.img} onPick={wImg.pick} iref={wImg.ref} onChange={wImg.onChange} label="上傳商品截圖" h={100}/></div>
            <div style={{marginBottom:13}}><label className="LS">商品名稱 *</label><input className="IS" value={wForm.item} onChange={e=>setWForm(p=>({...p,item:e.target.value}))} placeholder="例：Hello Kitty 扭蛋、限定版球鞋"/></div>
            <div style={{marginBottom:22}}><label className="LS">備註</label><textarea className="IS" value={wForm.note} onChange={e=>setWForm(p=>({...p,note:e.target.value}))} placeholder="顏色、尺寸、預算等..." rows={3} style={{resize:"none"}}/></div>
            <div style={{display:"flex",gap:10}}>

// ══ AGENT DASHBOARD ══════════════════════════
function AgentDash({orders,setOrders,clients,setClients,products,setProducts,onLogout,liveRates,sellRates,setSellRates,wallets,setWallets,wishlists,setWishlists,pending,setPending}){
  const [tab,setTab]=useState("orders");
  const [fStatus,setFStatus]=useState("all");
  const [showOF,setShowOF]=useState(false);const [editO,setEditO]=useState(null);
  const [showPF,setShowPF]=useState(false);const [editP,setEditP]=useState(null);
  const [editingR,setEditingR]=useState(false);const [tempSell,setTempSell]=useState({...sellRates});
  const [newCName,setNewCName]=useState("");
  const [oForm,setOForm]=useState({clientName:"",clientCode:"",item:"",price:"",currency:"JPY",note:"",status:"pending",rateType:"general"});
  const [pForm,setPForm]=useState({name:"",price:"",currency:"JPY",category:"美妝保養",desc:"",inStock:true,rateType:"general",keepShell:false,customRate:""});
  const [toast,showToast]=useToast();
  const pImg=useImg();
  const oImg=useImg();

  const filtered=orders.filter(o=>fStatus==="all"||o.status===fStatus);
  const totalProfit=orders.reduce((s,o)=>s+(productTWD(o,sellRates)-toTWD(o.price,o.currency,liveRates)),0);
  const stats={total:orders.length,pending:orders.filter(o=>o.status==="pending").length,bought:orders.filter(o=>o.status==="bought").length};

  function submitO(){
    if(!oForm.clientName||!oForm.item||!oForm.price){showToast("請填寫必填欄位","error");return;}
    const now=new Date().toISOString().split("T")[0];
    const c=clients.find(x=>x.name===oForm.clientName);
    const entry={...oForm,clientCode:c?.clientCode||oForm.clientCode||"",price:+oForm.price,image:oImg.img||null};
    if(editO){setOrders(p=>p.map(o=>o.id===editO.id?{...o,...entry,updatedAt:now}:o));showToast("已更新 ✨");}
    else{setOrders(p=>[...p,{id:Date.now(),...entry,createdAt:now,updatedAt:now}]);showToast("已新增 🎉");}
    setShowOF(false);setEditO(null);oImg.setImg(null);
    setOForm({clientName:"",clientCode:"",item:"",price:"",currency:"JPY",note:"",status:"pending",rateType:"general"});
  }
  function submitP(){
    if(!pForm.name||!pForm.price){showToast("請填寫商品名稱和價格","error");return;}
    const cr=pForm.customRate?+pForm.customRate:undefined;
    if(editP){setProducts(p=>p.map(x=>x.id===editP.id?{...x,...pForm,price:+pForm.price,customRate:cr,image:pImg.img??x.image}:x));showToast("已更新 ✨");}
    else{setProducts(p=>[...p,{id:Date.now(),...pForm,price:+pForm.price,customRate:cr,image:pImg.img}]);showToast("已新增 🎉");}
    setShowPF(false);setEditP(null);pImg.setImg(null);
    setPForm({name:"",price:"",currency:"JPY",category:"美妝保養",desc:"",inStock:true,rateType:"general",keepShell:false,customRate:""});
  }
  function openEditO(o){setEditO(o);setOForm({...o,price:String(o.price)});setShowOF(true);}
  function openEditP(p){setEditP(p);setPForm({...p,price:String(p.price),customRate:p.customRate?String(p.customRate):"",rateType:p.rateType||"general",keepShell:p.keepShell||false});pImg.setImg(p.image);setShowPF(true);}
  function chStatus(id,s){setOrders(p=>p.map(o=>o.id===id?{...o,status:s,updatedAt:new Date().toISOString().split("T")[0]}:o));showToast(`${STATUS[s].icon} ${STATUS[s].label}`);}
  function addClient(){
    if(!newCName.trim()){showToast("請填寫群組暱稱","error");return;}
    if(clients.find(c=>c.name===newCName.trim())){showToast("此暱稱已存在","error");return;}
    const code=`A${String(clients.length+1).padStart(3,"0")}`;
    setClients(p=>[...p,{clientCode:code,name:newCName.trim()}]);setNewCName("");showToast(`已新增 🎉`);
  }

  const TABS=[{key:"orders",label:"訂單管理"},{key:"review",label:`審核${pending&&pending.length>0?` (${pending.length})`:""}`,badge:pending&&pending.length>0},{key:"products",label:"商品目錄"},{key:"wish",label:"許願清單"},{key:"exchange",label:"匯率設定"},{key:"clients",label:"客人管理"},{key:"history",label:"歷程"}];

  return(

                              <option value="noted">✅ 已收到</option>

                            </select>

                    </div>

                  </div>
                  <div style={{background:+diff>=0?"#f0fdf4":"#fff1f1",borderRadius:10,padding:"8px",textAlign:"center"}}><div style={{fontWeight:900,color:+diff>=0?"#16a34a":"#e11d48"}}>{+diff>=0?"+":""}{diff}%</div></div>
                </div>
              );

            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {clients.map(c=><ClientCard key={c.clientCode} c={c} orders={orders} wallets={wallets} setWallets={setWallets} setClients={setClients} showToast={showToast}/>)}

          <div>

                          <div style={{flex:1}}>
                            <div style={{fontSize:11,color:"#f59e0b",fontWeight:700,marginBottom:4}}>🛍️ {item.groupProductName}</div>

                            <div style={{fontSize:11,color:"#8aabcc",marginTop:2}}>匯率 {item.rate} · {item.createdAt}</div>
                          </div>

                          <button onClick={()=>{
                            const now=new Date().toISOString().split("T")[0];
                            const newOrder={id:Date.now(),clientCode:item.clientCode,clientName:item.clientName,
                              item:item.item,price:item.price,currency:"JPY",note:item.note||"",
                              image:item.image||null,status:"pending",rateType:"souvenir",
                              customRate:item.rate,createdAt:now,updatedAt:now};
                            setOrders(p=>[...p,newOrder]);
                            setPending(p=>p.filter(x=>x.id!==item.id));
                            showToast(`✅ 已核准 ${item.clientName} 的申請`);
                          }} className="tap"
                            style={{flex:1,padding:"10px 0",borderRadius:10,border:"none",background:"linear-gradient(135deg,#22c55e,#4ade80)",color:"#fff",fontWeight:800,cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>
                            ✅ 核准
                          </button>
                          <button onClick={()=>{
                            setPending(p=>p.filter(x=>x.id!==item.id));
                            showToast(`已拒絕申請`,"error");
                          }} className="tap"
                            style={{flex:1,padding:"10px 0",borderRadius:10,border:"1.5px solid #fee2e2",background:"#fff8f8",color:"#ef4444",fontWeight:800,cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>
                            ❌ 拒絕
                          </button>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            }
          </div>
        )}

        {/* HISTORY */}
        {tab==="history"&&(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {orders.length===0&&<div className="card" style={{padding:40,textAlign:"center",color:"#b0cde0"}}><div style={{fontSize:36}}>📋</div><div style={{fontWeight:700,marginTop:8}}>還沒有歷程</div></div>}

              const s=STATUS[o.status];
              return(
                <div key={o.id} className="card" style={{overflow:"hidden"}}>

                    <div style={{width:36,height:36,borderRadius:10,background:s.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{s.icon}</div>
                    <div style={{flex:1}}><div style={{fontWeight:800,color:"#1a2a3a",fontSize:13}}>{o.item}</div><div style={{fontSize:11,color:"#8aabcc"}}>{o.clientName} · {o.updatedAt}</div></div>
                    <span className="chip" style={{background:s.bg,color:s.color}}>{s.label}</span>
                  </div>
                </div>

            })}
          </div>

        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowOF(false)}>

            <div style={{display:"flex",justifyContent:"space-between",marginBottom:18}}>
              <div style={{fontWeight:900,fontSize:18,color:"#1a2a3a"}}>{editO?"✏️ 編輯訂單":"＋ 新增訂單"}</div>
              <button onClick={()=>setShowOF(false)} style={{background:"#f0f8ff",border:"none",borderRadius:10,width:32,height:32,cursor:"pointer",fontSize:18,color:"#8aabcc"}}>×</button>
            </div>

            {/* 商品圖片 */}
            <div style={{marginBottom:14}}><label className="LS">商品圖片（選填）</label><ImgBox img={oImg.img} onPick={oImg.pick} iref={oImg.ref} onChange={oImg.onChange} label="點擊上傳商品圖片" h={130}/></div>

            {/* 客人下拉 */}
            <div style={{marginBottom:13}}>
              <label className="LS">客人姓名 *</label>
              <select className="IS" value={oForm.clientName} onChange={e=>{
                const name=e.target.value;
                const c=clients.find(x=>x.name===name);
                setOForm(p=>({...p,clientName:name,clientCode:c?.clientCode||""}));
              }} style={{color:oForm.clientName?"#1a2a3a":"#8aabcc",fontWeight:700}}>
                <option value="">請選擇客人</option>
                {clients.map(c=><option key={c.clientCode} value={c.name}>{c.name}</option>)}
              </select>
            </div>

            {/* 商品名稱 */}
            <div style={{marginBottom:13}}><label className="LS">商品名稱 *</label><input className="IS" value={oForm.item} onChange={e=>setOForm(p=>({...p,item:e.target.value}))} placeholder="例：Nike Air Max 2024"/></div>

            {/* 價格幣別 */}
            <div style={{display:"flex",gap:10,marginBottom:13}}>
              <div style={{flex:2}}><label className="LS">價格 *</label><input className="IS" type="number" value={oForm.price} onChange={e=>setOForm(p=>({...p,price:e.target.value}))} placeholder="0"/></div>
              <div style={{flex:1}}><label className="LS">幣別</label><select className="IS" value={oForm.currency} onChange={e=>setOForm(p=>({...p,currency:e.target.value}))} style={{color:"#4a9fd4",fontWeight:700}}>{CURRENCIES.map(c=><option key={c}>{c}</option>)}</select></div>
            </div>

            {/* 商品類型 */}
            <div style={{marginBottom:13}}>
              <label className="LS">商品類型</label>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {Object.entries(RATE_TYPES).filter(([k])=>k!=="group").map(([k,v])=>(
                  <button key={k} onClick={()=>setOForm(p=>({...p,rateType:k}))} className="tap"
                    style={{padding:"10px 8px",borderRadius:12,border:`2px solid ${oForm.rateType===k?v.color:"#e8f4fb"}`,background:oForm.rateType===k?v.color+"15":"#f7fbff",cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>
                    <div style={{fontWeight:800,fontSize:12,color:oForm.rateType===k?v.color:"#6a90aa"}}>{v.label}</div>
                    <div style={{fontSize:11,color:"#8aabcc",marginTop:2}}>{v.rate?`匯率 ${v.rate}`:"固定定價"}</div>
                  </button>
                ))}
              </div>
            </div>

            {/* 狀態 */}
            <div style={{marginBottom:13}}><label className="LS">狀態</label><select className="IS" value={oForm.status} onChange={e=>setOForm(p=>({...p,status:e.target.value}))} style={{color:"#4a9fd4",fontWeight:700}}>{Object.entries(STATUS).map(([k,v])=><option key={k} value={k}>{v.icon} {v.label}</option>)}</select></div>

            {/* 備註 */}
            <div style={{marginBottom:22}}><label className="LS">備註</label><textarea className="IS" value={oForm.note} onChange={e=>setOForm(p=>({...p,note:e.target.value}))} placeholder="尺寸、顏色等..." rows={2} style={{resize:"vertical"}}/></div>

            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setShowOF(false)} className="tap btn-gray" style={{flex:1}}>取消</button>
              <button onClick={submitO} className="tap btn-blue" style={{flex:2}}>{editO?"儲存變更":"新增訂單"}</button>
            </div>
          </div>
        </div>
      )}

      {/* PRODUCT FORM */}
      {showPF&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowPF(false)}>
          <div className="modal-box">
            <div className="modal-handle"/>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:18}}>
              <div style={{fontWeight:900,fontSize:18,color:"#1a2a3a"}}>{editP?"✏️ 編輯商品":"＋ 新增商品"}</div>
              <button onClick={()=>setShowPF(false)} style={{background:"#f0f8ff",border:"none",borderRadius:10,width:32,height:32,cursor:"pointer",fontSize:18,color:"#8aabcc"}}>×</button>
            </div>
            <div style={{marginBottom:16}}><label className="LS">商品圖片</label><ImgBox img={pImg.img} onPick={pImg.pick} iref={pImg.ref} onChange={pImg.onChange} label="點擊上傳商品圖片" h={150}/></div>
            <div style={{marginBottom:13}}><label className="LS">商品名稱 *</label><input className="IS" value={pForm.name} onChange={e=>setPForm(p=>({...p,name:e.target.value}))} placeholder="例：資生堂防曬乳 SPF50"/></div>
            <div style={{display:"flex",gap:10,marginBottom:13}}>
              <div style={{flex:2}}><label className="LS">價格 *</label><input className="IS" type="number" value={pForm.price} onChange={e=>setPForm(p=>({...p,price:e.target.value}))} placeholder="0"/></div>
              <div style={{flex:1}}><label className="LS">幣別</label><select className="IS" value={pForm.currency} onChange={e=>setPForm(p=>({...p,currency:e.target.value}))} style={{color:"#4a9fd4",fontWeight:700}}>{CURRENCIES.map(c=><option key={c}>{c}</option>)}</select></div>
            </div>
            <div style={{marginBottom:13}}><label className="LS">分類</label><select className="IS" value={pForm.category} onChange={e=>setPForm(p=>({...p,category:e.target.value}))} style={{color:"#4a9fd4",fontWeight:700}}>{CATS.filter(c=>c!=="全部").map(c=><option key={c}>{c}</option>)}</select></div>
            <div style={{marginBottom:13}}><label className="LS">商品說明</label><input className="IS" value={pForm.desc} onChange={e=>setPForm(p=>({...p,desc:e.target.value}))} placeholder="例：75ml，多色可選"/></div>
            <div style={{marginBottom:13}}>
              <label className="LS">商品類型（決定匯率）</label>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {Object.entries(RATE_TYPES).map(([k,v])=>(
                  <button key={k} onClick={()=>setPForm(p=>({...p,rateType:k}))} className="tap"
                    style={{padding:"10px 8px",borderRadius:12,border:`2px solid ${pForm.rateType===k?v.color:"#e8f4fb"}`,background:pForm.rateType===k?v.color+"15":"#f7fbff",cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>
                    <div style={{fontWeight:800,fontSize:12,color:pForm.rateType===k?v.color:"#6a90aa"}}>{v.label}</div>
                    <div style={{fontSize:11,color:"#8aabcc",marginTop:2}}>{v.rate?`匯率 ${v.rate}`:"固定定價"}</div>
                  </button>
                ))}
              </div>
            </div>
            {pForm.rateType==="gacha"&&(
              <div style={{background:"#fdf4ff",border:"1.5px solid #e9d5ff",borderRadius:14,padding:"14px",marginBottom:13}}>
                <div style={{fontWeight:800,color:"#7e22ce",fontSize:13,marginBottom:10}}>🎰 扭蛋定價表（點選）</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:10}}>
                  {GACHA_PRICES.map(g=>(
                    <div key={g.jpy} onClick={()=>setPForm(p=>({...p,price:String(g.jpy)}))} className="tap"
                      style={{background:pForm.price===String(g.jpy)?"#a855f7":"#fff",borderRadius:10,padding:"8px 10px",border:`1.5px solid ${pForm.price===String(g.jpy)?"#a855f7":"#e9d5ff"}`,cursor:"pointer",textAlign:"center"}}>
                      <div style={{fontWeight:900,color:pForm.price===String(g.jpy)?"#fff":"#7e22ce",fontSize:14}}>{g.jpy}¥</div>
                      <div style={{fontWeight:700,color:pForm.price===String(g.jpy)?"rgba(255,255,255,.8)":"#a855f7",fontSize:12}}>NT${g.twd}</div>
                    </div>
                  ))}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <button onClick={()=>setPForm(p=>({...p,keepShell:!p.keepShell}))} className="tap"
                    style={{width:44,height:24,borderRadius:12,border:"none",cursor:"pointer",background:pForm.keepShell?"#a855f7":"#d1d5db",position:"relative",flexShrink:0}}>
                    <div style={{width:18,height:18,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:pForm.keepShell?22:3,transition:"left .2s"}}/>
                  </button>
                  <span style={{fontSize:13,color:pForm.keepShell?"#7e22ce":"#8aabcc",fontWeight:700}}>{pForm.keepShell?"留蛋殼（+NT$5）":"只留蛋紙"}</span>
                </div>
                {pForm.price&&<div style={{marginTop:10,background:"#fff",borderRadius:10,padding:"8px 12px",fontSize:13,color:"#7e22ce",fontWeight:700}}>💰 售價：NT${gachaTWD(+pForm.price,pForm.keepShell)}</div>}
              </div>
            )}
            {pForm.rateType!=="gacha"&&(
              <div style={{marginBottom:13}}>
                <label className="LS">自訂匯率（選填，覆蓋類型匯率）</label>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <input className="IS" type="number" step="0.001" value={pForm.customRate} onChange={e=>setPForm(p=>({...p,customRate:e.target.value}))} placeholder={`預設 ${RATE_TYPES[pForm.rateType]?.rate||0.26}`} style={{flex:1}}/>
                  {pForm.customRate&&<span style={{color:"#c8900a",fontWeight:700,fontSize:13,whiteSpace:"nowrap"}}>= NT${pForm.price?Math.round(+pForm.price*(+pForm.customRate)).toLocaleString():"?"}</span>}
                </div>
              </div>
            )}
            <div style={{marginBottom:22,display:"flex",alignItems:"center",gap:12}}>
              <label style={{fontSize:13,fontWeight:800,color:"#374151"}}>上架販售</label>
              <button onClick={()=>setPForm(p=>({...p,inStock:!p.inStock}))} className="tap"
                style={{width:52,height:28,borderRadius:14,border:"none",cursor:"pointer",background:pForm.inStock?"#4a9fd4":"#d1d5db",position:"relative"}}>
                <div style={{width:22,height:22,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:pForm.inStock?26:4,transition:"left .2s",boxShadow:"0 1px 4px rgba(0,0,0,.2)"}}/>
              </button>
              <span style={{fontSize:13,color:pForm.inStock?"#22c55e":"#94a3b8",fontWeight:700}}>{pForm.inStock?"販售中":"已下架"}</span>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setShowPF(false)} className="tap btn-gray" style={{flex:1}}>取消</button>
              <button onClick={submitP} className="tap btn-blue" style={{flex:2}}>{editP?"儲存變更":"新增商品"}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ══ ROOT ═════════════════════════════════════
function App(){
  const [screen,setScreen]=useState("home");
  const [loggedIn,setLoggedIn]=useState(false);
  const [orders,setOrdersR]  =useState(()=>load("orders",[]));
  const [clients,setClientsR]=useState(()=>load("clients",[
    {clientCode:"A001",name:"小美"},{clientCode:"B002",name:"阿志"},{clientCode:"C003",name:"小花"}
  ]));
  const [products,setProductsR]=useState(()=>load("products",[
    {id:1,name:"資生堂防曬乳 SPF50",price:2800,currency:"JPY",category:"美妝保養",desc:"75ml",inStock:true,image:null,rateType:"general"},
    {id:2,name:"SK-II 神仙水 230ml",price:320,currency:"USD",category:"美妝保養",desc:"限量供應",inStock:true,image:null,rateType:"general"},
    {id:3,name:"Nike Air Max 2024",price:12000,currency:"JPY",category:"服飾鞋包",desc:"多色多尺寸",inStock:true,image:null,rateType:"general"},
    {id:4,name:"北海道白色戀人",price:1500,currency:"JPY",category:"食品零食",desc:"18片裝",inStock:true,image:null,rateType:"souvenir"},
  ]));
  const [sellRates,setSellRatesR]=useState(()=>load("sellRates",SELL_RATES0));
  const [wallets,setWalletsR]   =useState(()=>load("wallets",{}));
  const [wishlists,setWishlistsR]=useState(()=>load("wishlists",{}));
  const [pending,setPendingR]=useState(()=>load("pending",[])); // group order submissions awaiting approval
  const [liveRates,setLiveRates]=useState(BASE_RATES);

  function setOrders(v){const nv=typeof v==="function"?v(orders):v;setOrdersR(nv);save("orders",nv);}
  function setClients(v){const nv=typeof v==="function"?v(clients):v;setClientsR(nv);save("clients",nv);}
  function setProducts(v){const nv=typeof v==="function"?v(products):v;setProductsR(nv);save("products",nv);}
  function setSellRates(v){const nv=typeof v==="function"?v(sellRates):v;setSellRatesR(nv);save("sellRates",nv);}
  function setWallets(v){const nv=typeof v==="function"?v(wallets):v;setWalletsR(nv);save("wallets",nv);}
  function setWishlists(v){const nv=typeof v==="function"?v(wishlists):v;setWishlistsR(nv);save("wishlists",nv);}
  function setPending(v){const nv=typeof v==="function"?v(pending):v;setPendingR(nv);save("pending",nv);}

  useEffect(()=>{
    const id=setInterval(()=>setLiveRates(p=>({...p,JPY:+(p.JPY+(Math.random()-.5)*.002).toFixed(4),USD:+(p.USD+(Math.random()-.5)*.05).toFixed(3)})),5000);
    return ()=>clearInterval(id);
  },[]);

  if(screen==="home") return <Home onAgent={()=>setScreen("agent")} onClient={()=>setScreen("client")}/>;
  if(screen==="client") return <ClientView orders={orders} setOrders={setOrders} clients={clients} setClients={setClients} products={products} sellRates={sellRates} wallets={wallets} setWallets={setWallets} wishlists={wishlists} setWishlists={setWishlists} pending={pending} setPending={setPending} onBack={()=>setScreen("home")}/>;
  if(screen==="agent"&&!loggedIn) return <AgentLogin onLogin={()=>setLoggedIn(true)} onBack={()=>setScreen("home")}/>;
  return <AgentDash orders={orders} setOrders={setOrders} clients={clients} setClients={setClients} products={products} setProducts={setProducts} onLogout={()=>{setLoggedIn(false);setScreen("home");}} liveRates={liveRates} sellRates={sellRates} setSellRates={setSellRates} wallets={wallets} setWallets={setWallets} wishlists={wishlists} setWishlists={setWishlists} pending={pending} setPending={setPending}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
